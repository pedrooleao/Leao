<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎸 Curso de Baixo — Do Básico ao Profissional</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --card: #141422;
  --card2: #1a1a2e;
  --border: #252540;
  --border2: #2e2e50;
  --accent: #ff4d1c;
  --accent2: #f5a623;
  --accent3: #3d9bff;
  --green: #22c975;
  --purple: #a855f7;
  --text: #eeedf8;
  --muted: #7070a0;
  --muted2: #9090b8;
  --sidebar-w: 300px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  line-height:1.6;
  display:flex;
  min-height:100vh;
  overflow-x:hidden;
}

/* ─── SIDEBAR ─── */
#sidebar{
  width:var(--sidebar-w);
  min-width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  height:100vh;
  position:fixed;
  top:0; left:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  z-index:50;
  transition:transform 0.3s ease;
}
#sidebar-logo{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#sidebar-logo .logo-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:1px;
  color:var(--text);
  line-height:1;
}
#sidebar-logo .logo-sub{
  font-family:'Space Mono',monospace;
  font-size:9px;
  color:var(--muted);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-top:3px;
}

/* overall progress bar */
#overall-progress{
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.op-label{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:var(--muted);
  font-family:'Space Mono',monospace;
  margin-bottom:6px;
}
.op-bar{
  height:4px;
  background:var(--border);
  border-radius:4px;
  overflow:hidden;
}
.op-fill{
  height:100%;
  background:linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius:4px;
  transition:width 0.5s ease;
}

/* nav tree */
#sidebar-nav{
  flex:1;
  overflow-y:auto;
  padding:8px 0 16px;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
#sidebar-nav::-webkit-scrollbar{width:4px;}
#sidebar-nav::-webkit-scrollbar-track{background:transparent;}
#sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);}

.phase-group{}
.phase-group-header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 20px 6px;
  cursor:pointer;
  user-select:none;
}
.phase-group-header:hover .pgh-label{color:var(--text);}
.pgh-dot{
  width:8px;height:8px;
  border-radius:50%;
  flex-shrink:0;
}
.pgh-label{
  font-family:'Space Mono',monospace;
  font-size:9px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--muted);
  flex:1;
  transition:color 0.2s;
}
.pgh-count{
  font-family:'Space Mono',monospace;
  font-size:9px;
  color:var(--muted);
}
.pgh-arrow{
  font-size:10px;
  color:var(--muted);
  transition:transform 0.2s;
}
.phase-group.collapsed .pgh-arrow{transform:rotate(-90deg);}
.phase-group.collapsed .phase-lessons{display:none;}

.phase-lessons{}
.lesson-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:7px 20px 7px 22px;
  cursor:pointer;
  transition:background 0.15s;
  border-left:2px solid transparent;
}
.lesson-item:hover{background:rgba(255,255,255,0.03);}
.lesson-item.active{
  background:rgba(255,255,255,0.05);
}
.lesson-item.done .li-title{color:var(--muted);}
.li-check{
  width:16px; height:16px;
  border-radius:50%;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  font-size:9px;
  transition:all 0.2s;
}
.lesson-item.done .li-check{
  background:var(--green);
  border-color:var(--green);
  color:#000;
}
.li-title{
  font-size:12px;
  color:var(--muted2);
  flex:1;
  line-height:1.3;
  transition:color 0.2s;
}
.lesson-item.active .li-title{color:var(--text); font-weight:600;}
.li-num{
  font-family:'Space Mono',monospace;
  font-size:9px;
  color:var(--muted);
  flex-shrink:0;
}

/* ─── MAIN ─── */
#main{
  margin-left:var(--sidebar-w);
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* topbar */
#topbar{
  position:sticky;
  top:0;
  z-index:40;
  background:rgba(8,8,16,0.9);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 32px;
  height:56px;
  display:flex;
  align-items:center;
  gap:16px;
}
#menu-btn{
  display:none;
  background:none;border:none;color:var(--text);
  font-size:20px;cursor:pointer;padding:4px;
}
#breadcrumb{
  flex:1;
  font-size:12px;
  color:var(--muted);
  font-family:'Space Mono',monospace;
}
#breadcrumb span{color:var(--text);}

/* timer */
#timer-widget{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
  padding:6px 12px;
}
#timer-display{
  font-family:'Space Mono',monospace;
  font-size:14px;
  color:var(--accent2);
  min-width:50px;
  text-align:center;
}
.timer-btn{
  background:none;border:none;cursor:pointer;
  font-size:14px;padding:2px 4px;
  border-radius:3px;
  transition:background 0.15s;
}
.timer-btn:hover{background:rgba(255,255,255,0.08);}

/* content area */
#content{
  flex:1;
  padding:40px 48px 80px;
  max-width:900px;
}

/* lesson header */
.lesson-header{
  margin-bottom:36px;
}
.lh-phase{
  font-family:'Space Mono',monospace;
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:10px;
}
.lh-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;
  letter-spacing:2px;
  color:var(--muted);
  margin-bottom:6px;
}
.lh-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(36px,5vw,58px);
  line-height:0.95;
  margin-bottom:16px;
}
.lh-desc{
  font-size:16px;
  color:var(--muted2);
  max-width:620px;
  line-height:1.7;
  font-weight:300;
}
.lh-meta{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:16px;
}
.lh-tag{
  font-family:'Space Mono',monospace;
  font-size:10px;
  letter-spacing:1px;
  padding:4px 12px;
  border-radius:2px;
  text-transform:uppercase;
}

/* divider */
.content-divider{
  height:1px;
  background:var(--border);
  margin:32px 0;
}

/* section title */
.section-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:1px;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:10px;
}
.section-title::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}

/* topics grid */
.topics-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:10px;
  margin-bottom:28px;
}
.topic-card{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:14px 16px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
  font-size:13px;
  line-height:1.5;
  transition:border-color 0.2s, transform 0.15s;
}
.topic-card:hover{
  border-color:var(--border2);
  transform:translateY(-1px);
}
.topic-icon{font-size:18px;flex-shrink:0;margin-top:1px;}

/* practice box */
.practice-box{
  padding:20px 22px;
  border-left:3px solid var(--accent);
  background:rgba(255,77,28,0.06);
  border-radius:0 6px 6px 0;
  margin:24px 0;
}
.practice-box.green{border-color:var(--green);background:rgba(34,201,117,0.06);}
.practice-box.blue{border-color:var(--accent3);background:rgba(61,155,255,0.06);}
.practice-box.orange{border-color:var(--accent2);background:rgba(245,166,35,0.06);}
.practice-box.purple{border-color:var(--purple);background:rgba(168,85,247,0.06);}
.pb-label{
  font-family:'Space Mono',monospace;
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:10px;
}
.practice-box.green .pb-label{color:var(--green);}
.practice-box.blue .pb-label{color:var(--accent3);}
.practice-box.orange .pb-label{color:var(--accent2);}
.practice-box.purple .pb-label{color:var(--purple);}
.practice-box:not([class*='green']):not([class*='blue']):not([class*='orange']):not([class*='purple']) .pb-label{color:var(--accent);}
.pb-text{font-size:14px;color:var(--muted2);line-height:1.75;}

/* refs */
.refs-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:10px;
}
.ref-card{
  padding:14px 16px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
}
.ref-name{font-size:13px;font-weight:600;margin-bottom:4px;}
.ref-desc{font-size:12px;color:var(--muted);line-height:1.4;}

/* checklist */
.checklist{display:flex;flex-direction:column;gap:8px;}
.check-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 16px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
  cursor:pointer;
  transition:all 0.2s;
  user-select:none;
}
.check-item:hover{border-color:var(--border2);}
.check-item.checked{
  background:rgba(34,201,117,0.06);
  border-color:rgba(34,201,117,0.3);
}
.check-box{
  width:18px;height:18px;
  border-radius:4px;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  font-size:11px;
  transition:all 0.2s;
}
.check-item.checked .check-box{
  background:var(--green);
  border-color:var(--green);
  color:#000;
}
.check-text{font-size:13px;line-height:1.4;}
.check-item.checked .check-text{color:var(--muted);text-decoration:line-through;}

/* scale diagram */
.scale-diagram{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:20px;
  font-family:'Space Mono',monospace;
  font-size:13px;
  overflow-x:auto;
  margin:16px 0;
}
.scale-row{
  display:flex;
  align-items:center;
  gap:0;
  margin:4px 0;
}
.string-label{
  width:32px;
  color:var(--muted);
  font-size:11px;
  flex-shrink:0;
}
.fret{
  width:36px;
  height:28px;
  border-right:1px solid var(--border2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  color:var(--muted);
  flex-shrink:0;
}
.fret.root{
  background:var(--accent);
  color:#fff;
  border-radius:3px;
  font-weight:700;
  font-size:10px;
}
.fret.note{
  background:rgba(255,255,255,0.08);
  color:var(--text);
  border-radius:3px;
}
.fret-nums{
  display:flex;
  margin:0 0 8px 32px;
}
.fret-num{
  width:36px;
  text-align:center;
  font-size:10px;
  color:var(--muted);
  flex-shrink:0;
}

/* rhythm boxes */
.rhythm-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin:16px 0;
}
.beat-box{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
  padding:14px 10px;
  text-align:center;
}
.beat-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;
  color:var(--accent2);
  line-height:1;
}
.beat-label{font-size:11px;color:var(--muted);margin-top:4px;}

/* nav buttons */
.lesson-nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:48px;
  padding-top:32px;
  border-top:1px solid var(--border);
  gap:16px;
  flex-wrap:wrap;
}
.nav-btn{
  display:flex;
  align-items:center;
  gap:8px;
  padding:12px 20px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
  cursor:pointer;
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  transition:all 0.2s;
  text-decoration:none;
}
.nav-btn:hover{border-color:var(--border2);background:var(--card2);}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed;}
.nav-btn.primary{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
  font-weight:600;
}
.nav-btn.primary:hover{background:#e03d10;}
.nav-btn.done-btn{
  background:rgba(34,201,117,0.12);
  border-color:rgba(34,201,117,0.4);
  color:var(--green);
}
.nav-btn.done-btn.marked{
  background:var(--green);
  border-color:var(--green);
  color:#000;
  font-weight:700;
}

/* welcome screen */
#welcome-screen{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:70vh;
  text-align:center;
  padding:40px;
}
.ws-icon{font-size:72px;margin-bottom:24px;}
.ws-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(40px,6vw,72px);
  line-height:0.9;
  margin-bottom:16px;
}
.ws-title span{color:var(--accent);}
.ws-sub{
  font-size:16px;
  color:var(--muted2);
  max-width:500px;
  line-height:1.7;
  margin-bottom:32px;
  font-weight:300;
}
.ws-stats{
  display:flex;
  gap:32px;
  margin-bottom:40px;
  flex-wrap:wrap;
  justify-content:center;
}
.ws-stat{text-align:center;}
.ws-stat-n{
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;
  color:var(--accent);
  line-height:1;
}
.ws-stat-l{
  font-family:'Space Mono',monospace;
  font-size:9px;
  letter-spacing:2px;
  color:var(--muted);
  text-transform:uppercase;
  margin-top:2px;
}
.start-btn{
  padding:16px 40px;
  background:var(--accent);
  border:none;
  border-radius:6px;
  color:#fff;
  font-size:16px;
  font-weight:700;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
  transition:all 0.2s;
  letter-spacing:0.5px;
}
.start-btn:hover{background:#e03d10;transform:translateY(-1px);}

/* phase badge colors */
.fase1{color:var(--green);}
.fase2{color:var(--accent2);}
.fase3{color:var(--accent);}
.fase4{color:var(--accent3);}
.fase1-bg{background:rgba(34,201,117,0.12);color:var(--green);}
.fase2-bg{background:rgba(245,166,35,0.12);color:var(--accent2);}
.fase3-bg{background:rgba(255,77,28,0.12);color:var(--accent);}
.fase4-bg{background:rgba(61,155,255,0.12);color:var(--accent3);}

/* info box */
.info-box{
  background:var(--card2);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:20px 22px;
  margin:20px 0;
  font-size:14px;
  color:var(--muted2);
  line-height:1.75;
}
.info-box strong{color:var(--text);}

/* tip */
.tip{
  display:flex;
  gap:14px;
  padding:16px 18px;
  background:rgba(168,85,247,0.07);
  border:1px solid rgba(168,85,247,0.2);
  border-radius:6px;
  margin:16px 0;
  font-size:13px;
  color:var(--muted2);
  line-height:1.6;
}
.tip-icon{font-size:18px;flex-shrink:0;}

/* progress lesson bar */
.lesson-progress{
  margin-bottom:32px;
  padding:16px 20px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  display:flex;
  align-items:center;
  gap:16px;
}
.lp-text{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;white-space:nowrap;}
.lp-bar{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden;}
.lp-fill{height:100%;border-radius:4px;transition:width 0.5s ease;}

/* mobile */
@media(max-width:768px){
  #sidebar{transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);}
  #main{margin-left:0;}
  #menu-btn{display:block;}
  #content{padding:24px 20px 60px;}
  .topics-grid{grid-template-columns:1fr;}
  .rhythm-grid{grid-template-columns:repeat(2,1fr);}
  #sidebar-overlay{display:block;}
}
#sidebar-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  z-index:49;
}

/* scrollbar */
body::-webkit-scrollbar{width:6px;}
body::-webkit-scrollbar-track{background:var(--bg);}
body::-webkit-scrollbar-thumb{background:var(--border);}
</style>
</head>
<body>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- ─── SIDEBAR ─── -->
<div id="sidebar">
  <div id="sidebar-logo">
    <div class="logo-title">🎸 CURSO DE BAIXO</div>
    <div class="logo-sub">Do Básico ao Profissional</div>
  </div>
  <div id="overall-progress">
    <div class="op-label">
      <span>PROGRESSO GERAL</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="op-bar"><div class="op-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <nav id="sidebar-nav"></nav>
</div>

<!-- ─── MAIN ─── -->
<div id="main">
  <div id="topbar">
    <button id="menu-btn" onclick="toggleSidebar()">☰</button>
    <div id="breadcrumb">Selecione uma lição</div>
    <div id="timer-widget">
      <span>⏱</span>
      <span id="timer-display">00:00</span>
      <button class="timer-btn" id="timer-start-btn" onclick="timerToggle()" title="Iniciar/Pausar">▶</button>
      <button class="timer-btn" onclick="timerReset()" title="Resetar">↺</button>
    </div>
  </div>

  <div id="content">
    <!-- welcome or lesson rendered here -->
  </div>
</div>

<script>
// ════════════════════════════════════════════════
//  DATA — COURSE STRUCTURE
// ════════════════════════════════════════════════
const COURSE = [
  {
    id: 'fase1',
    label: 'FASE 1 · INICIANTE',
    color: 'var(--green)',
    dot: '#22c975',
    badgeClass: 'fase1-bg',
    textClass: 'fase1',
    duration: '3–6 meses · 1h/dia',
    lessons: [
      {
        id: 'f1m1', num: 'M01',
        title: 'Conhecendo o Instrumento',
        desc: 'Antes de tocar, você precisa entender completamente o seu instrumento. Anatomia, regulagem, cuidado e como o som é produzido.',
        content: () => `
          <div class="section-title">📋 Conteúdo da Aula</div>
          <div class="topics-grid">
            ${topics([
              ['🔩','Anatomia completa: corpo, braço, cavalete, captadores, tarraxas, bottons e porca de tensão'],
              ['🎸','Tipos de baixo: Precision Bass, Jazz Bass, ativo vs passivo — diferenças de som e toque'],
              ['🔌','Equipamento essencial: amplificador (combo vs cabeçote), cabo P10, afinador, correia'],
              ['🔧','Regulagem básica: ação das cordas (distância ao braço), truss rod, intonação do cavalete'],
              ['🧹','Manutenção: limpeza do braço, corpo e cordas; quando trocar as cordas'],
              ['🎵','Afinação: uso do afinador cromático clip-on e método de ouvido pela 5ª corda'],
              ['🪑','Postura sentado: baixo no joelho esquerdo ou cruzado, braço a 45°'],

// ════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════
function topics(arr) {
  return arr.map(([icon, text]) => `
    <div class="topic-card">
      <span class="topic-icon">${icon}</span>
      <span>${text}</span>
    </div>`).join('');
}

function fretNums(n) {
  let h = '';
  for(let i=0;i<=n;i++) h += `<div class="fret-num">${i}</div>`;
  return h;
}

function fretRow(notes) {
  return notes.map((n,i) => {
    const cls = i===0 ? 'fret root' : 'fret note';
    return `<div class="${cls}">${n}</div>`;
  }).join('');
}

function fretRowH(notes, total) {
  let html = '';
  for(let i=0;i<notes.length;i++){
    const n = notes[i];
    if(!n) html += `<div class="fret"></div>`;
    else if(n.includes('*')) html += `<div class="fret root">${n.replace('*','')}</div>`;
    else html += `<div class="fret note">${n}</div>`;
  }
  return html;
}

function checks(id, items) {
  return items.map((text,i) => {
    const key = `chk_${id}_${i}`;
    const done = getSaved(key);
    return `
      <div class="check-item${done?' checked':''}" onclick="toggleCheck('${key}',this)">
        <div class="check-box">${done?'✓':''}</div>
        <div class="check-text">${text}</div>
      </div>`;
  }).join('');
}

// ════════════════════════════════════════════════
//  STORAGE
// ════════════════════════════════════════════════
function getSaved(key) {
  try { return localStorage.getItem(key) === '1'; } catch(e){ return false; }
}
function setSaved(key, val) {
  try { localStorage.setItem(key, val?'1':'0'); } catch(e){}
}

function toggleCheck(key, el) {
  const cur = el.classList.contains('checked');
  const nv = !cur;
  setSaved(key, nv);
  el.classList.toggle('checked', nv);
  el.querySelector('.check-box').textContent = nv ? '✓' : '';
  updateProgress();
}

// ════════════════════════════════════════════════
//  PROGRESS
// ════════════════════════════════════════════════
function countChecks() {
  let total = 0, done = 0;
  COURSE.forEach(phase => phase.lessons.forEach(lesson => {
    const tmpDiv = document.createElement('div');
    tmpDiv.innerHTML = lesson.content();
    const cls = tmpDiv.querySelectorAll('.check-item');
    cls.forEach((_, i) => {
      total++;
      if(getSaved(`chk_${lesson.id}_${i}`)) done++;
    });
  }));
  return { total, done };
}

function countLessonChecks(lesson) {
  const tmpDiv = document.createElement('div');
  tmpDiv.innerHTML = lesson.content();
  const cls = tmpDiv.querySelectorAll('.check-item');
  let total = cls.length, done = 0;
  cls.forEach((_, i) => {
    if(getSaved(`chk_${lesson.id}_${i}`)) done++;
  });
  return { total, done };
}

function isLessonDone(lesson) {
  const {total, done} = countLessonChecks(lesson);
  return total > 0 && done === total;
}

function updateProgress() {
  const {total, done} = countChecks();
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  // update sidebar items
  COURSE.forEach(phase => phase.lessons.forEach(lesson => {
    const item = document.querySelector(`.lesson-item[data-id="${lesson.id}"]`);
    if(item) {
      const done = isLessonDone(lesson);
      item.classList.toggle('done', done);
      item.querySelector('.li-check').textContent = done ? '✓' : '';
    }
  }));
}

// ════════════════════════════════════════════════
//  BUILD SIDEBAR
// ════════════════════════════════════════════════
function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  COURSE.forEach((phase, pi) => {
    const group = document.createElement('div');
    group.className = 'phase-group';
    group.innerHTML = `
      <div class="phase-group-header" onclick="togglePhaseGroup(this)">
        <div class="pgh-dot" style="background:${phase.dot}"></div>
        <div class="pgh-label">${phase.label}</div>
        <div class="pgh-count">${phase.lessons.length}</div>
        <div class="pgh-arrow">▾</div>
      </div>
      <div class="phase-lessons">
        ${phase.lessons.map((lesson,li) => `
          <div class="lesson-item" data-id="${lesson.id}" onclick="loadLesson('${lesson.id}')" style="border-left-color:${phase.dot}">
            <div class="li-num">${lesson.num}</div>
            <div class="li-title">${lesson.title}</div>
            <div class="li-check"></div>
          </div>`).join('')}
      </div>`;
    nav.appendChild(group);
  });
}

function togglePhaseGroup(header) {
  header.closest('.phase-group').classList.toggle('collapsed');
}

// ════════════════════════════════════════════════
//  LESSON RENDERING
// ════════════════════════════════════════════════
let currentLessonId = null;
let allLessons = [];

function buildAllLessons() {
  allLessons = [];
  COURSE.forEach(phase => phase.lessons.forEach(lesson => {
    allLessons.push({ ...lesson, phase });
  }));
}

function getLessonIndex(id) {
  return allLessons.findIndex(l => l.id === id);
}

function loadLesson(id) {
  const entry = allLessons.find(l => l.id === id);
  if(!entry) return;
  currentLessonId = id;

  // active sidebar
  document.querySelectorAll('.lesson-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  const phase = entry.phase;
  const idx = getLessonIndex(id);
  const prev = idx > 0 ? allLessons[idx-1] : null;
  const next = idx < allLessons.length-1 ? allLessons[idx+1] : null;
  const {total, done} = countLessonChecks(entry);
  const pct = total > 0 ? Math.round(done/total*100) : 0;

  document.getElementById('breadcrumb').innerHTML =
    `<span class="${phase.textClass}">${phase.label}</span> / ${entry.title}`;

  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="lesson-header">
      <div class="lh-num">${entry.num}</div>
      <div class="lh-phase ${phase.textClass}">${phase.label}</div>
      <div class="lh-title">${entry.title}</div>
      <p class="lh-desc">${entry.desc}</p>
      <div class="lh-meta">
        <span class="lh-tag ${phase.badgeClass}">${phase.duration}</span>
      </div>
    </div>

    <div class="lesson-progress">
      <span class="lp-text">PROGRESSO DA LIÇÃO</span>
      <div class="lp-bar"><div class="lp-fill" id="lp-fill" style="width:${pct}%;background:${phase.color}"></div></div>
      <span class="lp-text">${done}/${total}</span>
    </div>

    ${entry.content()}

    <div class="section-title" style="margin-top:36px">✅ Checklist de Conclusão</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px">Marque cada item quando dominar o conteúdo. Seja honesto consigo mesmo!</p>

    <div class="lesson-nav">
      ${prev ? `<button class="nav-btn" onclick="loadLesson('${prev.id}')">← ${prev.title}</button>` : '<div></div>'}
      <button class="nav-btn done-btn ${isLessonDone(entry)?'marked':''}" onclick="markDone('${entry.id}',this)" id="done-btn">
        ${isLessonDone(entry) ? '✓ Concluída' : 'Marcar como concluída'}
      </button>
      ${next ? `<button class="nav-btn primary" onclick="loadLesson('${next.id}')">Próxima: ${next.title} →</button>` : '<button class="nav-btn primary" disabled>Curso Concluído 🎸</button>'}
    </div>`;

  content.scrollTop = 0;
  window.scrollTo(0,0);
  closeSidebar();
}

function markDone(id, btn) {
  const entry = allLessons.find(l => l.id === id);
  if(!entry) return;
  const tmpDiv = document.createElement('div');
  tmpDiv.innerHTML = entry.content();
  const cls = tmpDiv.querySelectorAll('.check-item');
  // mark all checks
  const allDone = isLessonDone(entry);
  cls.forEach((_, i) => {
    setSaved(`chk_${id}_${i}`, !allDone);
  });
  // re-render checks on page
  document.querySelectorAll('.check-item').forEach((el, i) => {
    const key = `chk_${id}_${i}`;
    const nv = !allDone;
    el.classList.toggle('checked', nv);
    el.querySelector('.check-box').textContent = nv ? '✓' : '';
  });
  updateProgress();
  const nowDone = isLessonDone(entry);
  btn.classList.toggle('marked', nowDone);
  btn.textContent = nowDone ? '✓ Concluída' : 'Marcar como concluída';
  // update lp
  const {total, done} = countLessonChecks(entry);
  const pct = total>0?Math.round(done/total*100):0;
  const lp = document.getElementById('lp-fill');
  if(lp) { lp.style.width=pct+'%'; }
}

// ════════════════════════════════════════════════
//  WELCOME SCREEN
// ════════════════════════════════════════════════
function showWelcome() {
  const {total, done} = countChecks();
  document.getElementById('breadcrumb').textContent = 'Bem-vindo';
  document.getElementById('content').innerHTML = `
    <div id="welcome-screen">
      <div class="ws-icon">🎸</div>
      <div class="ws-title">CURSO DE BAIXO<br><span>DO BÁSICO AO PRO</span></div>
      <p class="ws-sub">Um plano de estudos completo e estruturado para você se tornar um baixista profissional. Todo o conteúdo, exercícios e checklists para acompanhar seu progresso.</p>
      <div class="ws-stats">
        <div class="ws-stat"><div class="ws-stat-n">4</div><div class="ws-stat-l">Fases</div></div>
        <div class="ws-stat"><div class="ws-stat-n">23</div><div class="ws-stat-l">Módulos</div></div>
        <div class="ws-stat"><div class="ws-stat-n">${total}</div><div class="ws-stat-l">Objetivos</div></div>
        <div class="ws-stat"><div class="ws-stat-n">${done}</div><div class="ws-stat-l">Concluídos</div></div>
      </div>
      <button class="start-btn" onclick="loadLesson('f1m1')">
        ${done > 0 ? '▶ Continuar Estudando' : '🎸 Começar o Curso'}
      </button>
      <p style="margin-top:16px;font-size:12px;color:var(--muted)">Seu progresso é salvo automaticamente no navegador</p>
    </div>`;
}

// ════════════════════════════════════════════════
//  TIMER
// ════════════════════════════════════════════════
let timerSec = 0, timerRunning = false, timerInterval = null;

function timerToggle() {
  const btn = document.getElementById('timer-start-btn');
  if(timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    btn.textContent = '▶';
  } else {
    timerInterval = setInterval(() => {
      timerSec++;
      const m = String(Math.floor(timerSec/60)).padStart(2,'0');
      const s = String(timerSec%60).padStart(2,'0');
      document.getElementById('timer-display').textContent = m+':'+s;
    }, 1000);
    timerRunning = true;
    btn.textContent = '⏸';
  }
}

function timerReset() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSec = 0;
  document.getElementById('timer-display').textContent = '00:00';
  document.getElementById('timer-start-btn').textContent = '▶';
}

// ════════════════════════════════════════════════
//  SIDEBAR MOBILE
// ════════════════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').style.display =
    document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').style.display = 'none';
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
buildAllLessons();
buildSidebar();
updateProgress();
showWelcome();
</script>
