        desc: 'Não é quanto tempo você pratica — é como você pratica. A prática deliberada, focada e inteligente avança mais em 30 minutos do que 3 horas de repetição automática.',
        video: '',
        content: () => `
          <div class="section-title">🎯 Prática Deliberada — A Ciência do Aprendizado Eficiente</div>
          <div class="info-box">
            <strong>30 minutos bem praticados superam 3 horas no piloto automático.</strong><br><br>
            A pesquisa de K. Anders Ericsson sobre expertise e prática deliberada é clara: o que distingue especialistas de amadores não é a quantidade de horas totais — é a qualidade e intenção por trás de cada minuto praticado. Aprender a praticar <em>bem</em> é a habilidade mais transformadora que um pianista pode desenvolver.
          </div>

          <div class="expand-block">
            <button class="expand-toggle" onclick="toggleExpand('p19-deliberada')">
              <span><strong>🔬 Prática Deliberada vs Prática Automática</strong><br>
              <span class="expand-toggle-sub">O que diferencia a prática que avança da que apenas mantém</span></span>
              <span class="expand-icon">+</span>
            </button>
            <div class="expand-body" id="p19-deliberada" style="display:none">
              <p><strong>O que é prática automática:</strong> Tocar do começo ao fim da peça, repetir o que já funciona, passar pelos pontos difíceis sem resolver. É o modo padrão de quem "pratica" sem um objetivo claro. Resultado: você fica bom naquilo que já faz bem, e os pontos difíceis permanecem difíceis.</p>
              <p><strong>O que é prática deliberada:</strong> Prática com intenção específica, feedback imediato e foco nas bordas do que você consegue fazer — a "zona de desconforto produtivo". Você não repete o que é fácil; você ataca repetidamente o que é difícil até que fique fácil.</p>
              <p><strong>Os 4 elementos da prática deliberada (Ericsson):</strong></p>
              <ul>
                <li><strong>Objetivo específico:</strong> Não "praticar Chopin". Mas "dominar a transição do compasso 24 para o 25 com a mão esquerda sem olhar para as teclas".</li>
                <li><strong>Foco total:</strong> Sem distrações. A prática deliberada é mentalmente exaustiva — 30 minutos de foco real é mais produtivo que 2 horas dispersas.</li>
                <li><strong>Feedback imediato:</strong> Você precisa saber se está acertando ou errando. Grave-se, use o metrônomo, toque devagar o suficiente para ouvir cada nota.</li>
                <li><strong>Zona de desconforto:</strong> Se está fácil demais, não está crescendo. Se está impossível, também não. O alvo é o nível exatamente acima de onde você está confortável.</li>
              </ul>
              <p><strong>Como identificar o que realmente precisa de trabalho:</strong> Toque a peça uma vez do início ao fim. Marque mentalmente (ou no papel) cada vez que hesitar, errar ou sentir insegurança. Esses são seus pontos de trabalho reais. A sessão de prática começa exatamente nesses pontos — não no início da peça.</p>
            </div>
          </div>

          <div class="expand-block">
            <button class="expand-toggle" onclick="toggleExpand('p19-secoes')">
              <span><strong>✂️ Dividindo Peças em Seções</strong><br>
              <span class="expand-toggle-sub">Chunking, trabalhar do final e conectar gradualmente</span></span>
              <span class="expand-icon">+</span>
            </button>
            <div class="expand-body" id="p19-secoes" style="display:none">
              <p><strong>Por que dividir em seções:</strong> Uma peça de 3 minutos tem dezenas de pontos diferentes de dificuldade. Tentar trabalhar tudo de uma vez dispersa a atenção e reduz o progresso. Dividir em seções menores e trabalhar cada uma até a solidez antes de conectar é a abordagem mais eficiente.</p>
              <p><strong>O método "chunking":</strong></p>
              <ul>
                <li>Identifique as seções naturais da peça (frases, períodos, seções ABA)</li>
                <li>Divida cada seção em "chunks" menores: 2–4 compassos</li>
                <li>Trabalhe cada chunk separadamente até a solidez</li>
                <li>Conecte chunks adjacentes: pratique a transição entre chunk 1 e chunk 2</li>
                <li>Expanda gradualmente: chunk 1+2+3, depois 1+2+3+4, etc.</li>
              </ul>
              <p><strong>Trabalhar do final para o começo:</strong> Uma técnica poderosa e contraintuitiva. Aprenda o último compasso primeiro, depois o penúltimo + último, depois o antepenúltimo + penúltimo + último. Resultado: você chega no final da peça com a mesma solidez do começo — ao contrário do padrão comum onde o final sempre soa pior por ter sido praticado menos vezes.</p>
              <p><strong>Identificando os pontos difíceis:</strong></p>
              <ul>
                <li>Mudanças de posição de mão (saltos)</li>
                <li>Transições entre seções com pedal</li>
                <li>Passagens com diferentes ritmos entre as mãos</li>
                <li>Lugares onde a dinâmica muda bruscamente</li>
                <li>Cordas de dedilhado pouco natural</li>
              </ul>
              <p>Esses pontos merecem 80% do tempo de prática. O resto da peça quase se cuida sozinho.</p>
            </div>
          </div>

          <div class="expand-block">
            <button class="expand-toggle" onclick="toggleExpand('p19-lento')">
              <span><strong>🐢 O Poder do Slow Practice</strong><br>
              <span class="expand-toggle-sub">Por que tocar lento é a técnica mais eficaz da neurociência</span></span>
              <span class="expand-icon">+</span>
            </button>
            <div class="expand-body" id="p19-lento" style="display:none">
              <p><strong>Por que funciona neurologicamente:</strong> Quando você toca devagar, o sistema nervoso tem tempo suficiente para processar cada decisão motor conscientemente. Isso fortalece as conexões sinápticas corretas. Quando você toca rápido demais antes de estar pronto, você reforça os erros — cada repetição errada é uma repetição que precisa ser desaprendida depois.</p>
              <p><strong>"Slow practice is fast practice" (Glenn Gould e outros):</strong> Pianistas que dedicam tempo ao slow practice chegam à velocidade final mais rapidamente do que os que tentam atingir o tempo de performance desde o início. Parece contra-intuitivo mas é bem estabelecido pedagogicamente.</p>
              <p><strong>Como fazer slow practice com metrônomo:</strong></p>
              <ul>
                <li>Comece a 50–60% do tempo de performance (ex: peça em 120 BPM → comece em 60–70 BPM)</li>
                <li>Cada nota deve soar com qualidade de concerto — mesmo devagar</li>
                <li>Verifique: dedilhado correto, articulação, dinâmica, pedal, postura</li>
                <li>Aumente 4–5 BPM por sessão quando os critérios de qualidade estiverem todos atendidos</li>
                <li>Se errar ao aumentar o tempo, volte 10 BPM — não tente "empurrar" pela dificuldade</li>
              </ul>
              <p><strong>Slow practice sem metrônomo:</strong> Toque devagar mas de forma musical — com expressão, dinâmica e intenção. O objetivo não é robótico — é consciente. Sinta cada nota. Pense na próxima nota antes de tocar. Antecipação consciente é o que o slow practice constrói.</p>
              <p><strong>Armadilhas do praticar rápido demais:</strong> Pressão de tempo leva a tensão muscular, dedilhado errado adotado por conveniência, e erros de memória "escorregando". O resultado é uma performance que "funciona" em casa mas desmorona sob pressão — porque foi construída sobre alicerces frágeis.</p>
            </div>
          </div>

          <div class="expand-block">
            <button class="expand-toggle" onclick="toggleExpand('p19-rotina')">
              <span><strong>📅 Construindo uma Rotina de Estudo Eficiente</strong><br>
              <span class="expand-toggle-sub">Estrutura da sessão, planejamento semanal e diário de prática</span></span>
              <span class="expand-icon">+</span>
            </button>
            <div class="expand-body" id="p19-rotina" style="display:none">
              <p><strong>A estrutura ideal de uma sessão de estudo:</strong></p>
              <ul>
                <li><strong>Técnica (15–20%):</strong> Escalas, arpejos, exercícios específicos para problemas técnicos do repertório atual. Hanon, Czerny, ou exercícios personalizados. Não é "aquecimento" — é trabalho real.</li>
                <li><strong>Repertório (50–60%):</strong> O coração da sessão. Trabalho deliberado nos pontos difíceis, slow practice, chunking. Não tocar do início ao fim — atacar os problemas.</li>
                <li><strong>Leitura à primeira vista (10–15%):</strong> Ler peças novas que você nunca viu. Mantém a flexibilidade de leitura. Use coleções de peças fáceis — o objetivo é fluidez, não dificuldade.</li>
                <li><strong>Teoria/Análise (10–15%):</strong> Analisar a harmonia de uma peça do repertório, estudar uma progressão, entender a estrutura formal. Conecta o conhecimento teórico à prática real.</li>
              </ul>
              <p><strong>Como planejar a semana:</strong> Não trate todos os dias como iguais. Alterne ênfases: segunda-feira = técnica intensa. Terça = repertório + problemas específicos. Quarta = leitura + teoria. Quinta = repertório completo (simulação de performance). Sexta = revisão e consolidação. Sábado = exploração livre. Domingo = descanso ou estudo leve.</p>
              <p><strong>Diário de prática:</strong> Mantenha um caderno ou app onde você anota: o que praticou, o que melhorou, o que ainda precisa de trabalho, o objetivo para amanhã. Cinco minutos ao final de cada sessão. O diário cria consciência, evita repetir os mesmos erros e mantém o progresso visível — o que é essencial para motivação a longo prazo.</p>
              <p><strong>Como avaliar seu próprio progresso:</strong> Grave-se uma vez por semana tocando o repertório completo. Compare com a semana anterior. Ouça criticamente: o que melhorou? O que continua igual? A objetividade da gravação supera a percepção subjetiva durante a prática.</p>
            </div>
          </div>

        desc: 'Improvisar é falar musicalmente sem roteiro. É a habilidade mais expressiva do piano — e totalmente aprendível com o método certo.',

        content: () => `
    <div class="section-title">🎹 Improvisação Avançada — Jazz, Gospel e Estilo Livre</div>
    <div class="info-box">
      <strong>Por que aprender a improvisar?</strong><br><br>
      A maioria dos pianistas estudados toca o que está escrito. Os que improvisam fazem algo diferente: eles <em>conversam</em> com a música em tempo real. Improvisação não é tocar notas aleatórias — é ter vocabulário musical suficiente para expressar ideias espontaneamente, com coerência e intenção.<br><br>
      A boa notícia: improvisação é uma habilidade que se aprende, não um dom. Assim como aprender um idioma, você começa com frases simples (escalas, motivos curtos), depois frases mais elaboradas, depois conversas completas. Os grandes improvisadores — Bill Evans, Oscar Peterson, Herbie Hancock, Keith Jarrett — todos estudaram vocabulário de forma sistemática antes de "libertar" sua voz.<br><br>
      Neste módulo você vai aprender os fundamentos das três grandes linguagens de improvisação ao piano: <strong>jazz</strong> (ii-V-I, bebop, target notes), <strong>gospel</strong> (call and response, spread voicings, runs) e <strong>estilo livre</strong> (silêncio, exploração timbrística, expressar emoções puras). Cada uma vai expandir seu vocabulário musical de forma permanente.

    <div class="expand-block">

        <p><strong>O princípio básico:</strong> em improvisação, você escolhe notas com base nos acordes que estão sendo tocados. Cada acorde "pede" uma escala ou conjunto de notas que soam bem com ele.</p>
        <p><strong>As três relações fundamentais:</strong></p>
        <ul>
          <li><strong>Acorde maior (ex: Cmaj7):</strong> use a escala lídio (com #4) ou jônica. Sons: relaxado, luminoso, estável.</li>
          <li><strong>Acorde menor (ex: Dm7):</strong> use a escala dórica (com 6ª maior). Sons: introspectivo, suave, jazzístico.</li>

        </ul>
        <p><strong>O conceito de "menos é mais":</strong> os maiores improvisadores usam poucas notas com grande intenção, em vez de muitas notas sem propósito. Miles Davis é o mestre desse princípio — cada nota tem peso.</p>
        <p><strong>Motivo e desenvolvimento:</strong> crie uma ideia curta (3-4 notas) e desenvolva-a — repita em altura diferente, inverta, acelere, desacelere. Isso cria coerência e estrutura na improvisação.</p>
        <p><strong>Exercício inicial:</strong> sobre um acorde de Cmaj7, improvise usando apenas as notas Dó-Mi-Sol durante 2 minutos. Ritmos variados, alturas variadas. Depois adicione Ré. Depois La. Vá expandindo gradualmente.</p>

        <p><strong>Target notes (notas alvo):</strong> ao mudar de acorde, "aterrissar" numa nota que pertence ao acorde seguinte. Exemplo: ao chegar no G7, enfatizar Fá (a b7) ou Si (a 3ª maior). Isso cria a sensação de que a melodia "segue a harmonia".</p>
        <p><strong>Bebop scale:</strong> a escala mixolídio com uma nota cromática adicionada entre a 7ª e a 8ª (Sol-Lá-Si-Dó-Ré-Mi-Fá-F#-Sol). Essa nota extra alinha as notas fortes do acorde nos tempos fortes do compasso — o segredo do fraseado bebop.</p>

        <p><strong>Elementos fundamentais:</strong></p>

          <li><strong>Stretto:</strong> efeito dramático onde o sujeito se sobrepõe a si mesmo — uma voz começa antes que a anterior termine.</li>

        </ol>

//  HELPERS
// ════════════════════════════════════════════════
function topics(arr) {
  return arr.map(([icon, text]) => `
    <div class="topic-card">
      <span class="topic-icon">${icon}</span>
      <span>${text}</span>
    </div>`).join('');
}

function fretNums(n) {
  let h = '';
  for(let i=0;i<=n;i++) h += `<div class="fret-num">${i}</div>`;
  return h;
}

function fretRow(notes) {
  return notes.map((n,i) => {
    const cls = i===0 ? 'fret root' : 'fret note';
    return `<div class="${cls}">${n}</div>`;
  }).join('');
}

function fretRowH(notes, total) {
  let html = '';
  for(let i=0;i<notes.length;i++){
    const n = notes[i];
    if(!n) html += `<div class="fret"></div>`;
    else if(n.includes('*')) html += `<div class="fret root">${n.replace('*','')}</div>`;
    else html += `<div class="fret note">${n}</div>`;
  }
  return html;
}

function checks(id, items) {
  return items.map((text,i) => {
    const key = `chk_${id}_${i}`;
    const done = getSaved(key);
    return `
      <div class="check-item${done?' checked':''}" onclick="toggleCheck('${key}',this)">
        <div class="check-box">${done?'✓':''}</div>
        <div class="check-text">${text}</div>
      </div>`;
  }).join('');
}

// ════════════════════════════════════════════════
//  STORAGE
// ════════════════════════════════════════════════
function getSaved(key) {
  try { return localStorage.getItem(key) === '1'; } catch(e){ return false; }
}
function setSaved(key, val) {
  try { localStorage.setItem(key, val?'1':'0'); } catch(e){}
}

function toggleCheck(key, el) {
  const cur = el.classList.contains('checked');
  const nv = !cur;
  setSaved(key, nv);
  el.classList.toggle('checked', nv);
  el.querySelector('.check-box').textContent = nv ? '✓' : '';
  updateProgress();
}

// ════════════════════════════════════════════════
//  PROGRESS
// ════════════════════════════════════════════════
function countChecks() {
  let total = 0, done = 0;
  COURSE.forEach(phase => phase.lessons.forEach(lesson => {
    const tmpDiv = document.createElement('div');
    tmpDiv.innerHTML = lesson.content();
    const cls = tmpDiv.querySelectorAll('.check-item');
    cls.forEach((_, i) => {
      total++;
      if(getSaved(`chk_${lesson.id}_${i}`)) done++;
    });
  }));
  return { total, done };
}

function countLessonChecks(lesson) {
  const tmpDiv = document.createElement('div');
  tmpDiv.innerHTML = lesson.content();
  const cls = tmpDiv.querySelectorAll('.check-item');
  let total = cls.length, done = 0;
  cls.forEach((_, i) => {
    if(getSaved(`chk_${lesson.id}_${i}`)) done++;
  });
  return { total, done };
}

function isLessonDone(lesson) {
  const {total, done} = countLessonChecks(lesson);
  return total > 0 && done === total;
}

function updateProgress() {
  const {total, done} = countChecks();
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  // update sidebar items
  COURSE.forEach(phase => phase.lessons.forEach(lesson => {
    const item = document.querySelector(`.lesson-item[data-id="${lesson.id}"]`);
    if(item) {
      const done = isLessonDone(lesson);
      item.classList.toggle('done', done);
      item.querySelector('.li-check').textContent = done ? '✓' : '';
    }
  }));
}

function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  const lastLesson = localStorage.getItem('lastLesson_' + activeInstrument);
  COURSE.forEach((phase, pi) => {
    const stateKey = 'phase_open_' + activeInstrument + '_' + phase.id;
    const savedState = localStorage.getItem(stateKey);
    const hasActiveLesson = phase.lessons.some(l => l.id === lastLesson);
    // Open if: never explicitly closed, OR contains the active lesson
    const isOpen = savedState !== '0' || hasActiveLesson;
    const group = document.createElement('div');
    group.className = 'phase-group' + (isOpen ? '' : ' collapsed');
    group.innerHTML = `
      <div class="phase-group-header" onclick="togglePhaseGroup(this,'${phase.id}')">
        <div class="pgh-dot" style="background:${phase.dot}"></div>
        <div class="pgh-label">${phase.label}</div>
        <div class="pgh-count">${phase.lessons.length}</div>

      </div>

            <div class="li-title">${lesson.title}</div>

function togglePhaseGroup(header, phaseId) {
  const group = header.closest('.phase-group');
  const isNowCollapsed = group.classList.toggle('collapsed');

  localStorage.setItem(stateKey, isNowCollapsed ? '0' : '1');
}

let currentLessonId = null;
let allLessons = [];

function buildAllLessons() {
  allLessons = [];
  COURSE.forEach(phase => phase.lessons.forEach(lesson => {
    allLessons.push({ ...lesson, phase });
  }));
}

function getLessonIndex(id) {
  return allLessons.findIndex(l => l.id === id);
}

function loadLesson(id) {
  const entry = allLessons.find(l => l.id === id);
  if(!entry) return;
  currentLessonId = id;

  // active sidebar
  document.querySelectorAll('.lesson-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  const phase = entry.phase;
  const idx = getLessonIndex(id);
  const prev = idx > 0 ? allLessons[idx-1] : null;
  const next = idx < allLessons.length-1 ? allLessons[idx+1] : null;
  const {total, done} = countLessonChecks(entry);
  const pct = total > 0 ? Math.round(done/total*100) : 0;

  document.getElementById('breadcrumb').innerHTML =
    `<span class="${phase.textClass}">${phase.label}</span> / ${entry.title}`;

  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="lesson-header">
      <div class="lh-num">${entry.num}</div>
      <div class="lh-phase ${phase.textClass}">${phase.label}</div>
      <div class="lh-title">${entry.title}</div>
      <p class="lh-desc">${entry.desc}</p>
      <div class="lh-meta">
        <span class="lh-tag ${phase.badgeClass}">${phase.duration}</span>
        ${entry.video
          ? `<a class="video-btn" href="${entry.video}" target="_blank" rel="noopener">▶ Assistir Aula</a>`
          : `<a class="video-btn yt-search" href="https://www.youtube.com/results?search_query=${encodeURIComponent('aula ' + activeInstrument + ' ' + entry.title)}" target="_blank" rel="noopener">🔍 Buscar aula no YouTube</a>`}
      </div>
    </div>

    <div class="lesson-progress">
      <span class="lp-text">PROGRESSO DA LIÇÃO</span>
      <div class="lp-bar"><div class="lp-fill" id="lp-fill" style="width:${pct}%;background:${phase.color}"></div></div>
      <span class="lp-text">${done}/${total}</span>
    </div>

    ${entry.content()}

    <div class="section-title" style="margin-top:36px">✅ Checklist de Conclusão</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px">Marque cada item quando dominar o conteúdo. Seja honesto consigo mesmo!</p>

    <div class="lesson-nav">
      ${prev ? `<button class="nav-btn" onclick="loadLesson('${prev.id}')">← ${prev.title}</button>` : '<div></div>'}
      <button class="nav-btn done-btn ${isLessonDone(entry)?'marked':''}" onclick="markDone('${entry.id}',this)" id="done-btn">
        ${isLessonDone(entry) ? '✓ Concluída — clique para desmarcar' : 'Marcar tudo como feito ✓'}
      </button>
      ${next ? `<button class="nav-btn primary" onclick="loadLesson('${next.id}')">Próxima: ${next.title} →</button>` : '<button class="nav-btn primary" disabled>Curso Concluído 🎸</button>'}
    </div>`;

  // save last visited lesson for resume
  localStorage.setItem('lastLesson_' + activeInstrument, id);

  // fade-in animation
  content.style.animation = 'none';
  content.offsetHeight; // force reflow
  content.style.animation = 'fadeInUp .25s ease';

  content.scrollTop = 0;
  window.scrollTo(0,0);
  closeSidebar();

  // auto-scroll sidebar to active lesson
  const activeItem = document.querySelector('.lesson-item.active');
  if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function markDone(id, btn) {
  const entry = allLessons.find(l => l.id === id);
  if(!entry) return;
  const tmpDiv = document.createElement('div');
  tmpDiv.innerHTML = entry.content();
  const cls = tmpDiv.querySelectorAll('.check-item');
  // mark all checks
  const allDone = isLessonDone(entry);
  cls.forEach((_, i) => {
    setSaved(`chk_${id}_${i}`, !allDone);
  });
  // re-render checks on page
  document.querySelectorAll('.check-item').forEach((el, i) => {
    const key = `chk_${id}_${i}`;
    const nv = !allDone;
    el.classList.toggle('checked', nv);
    el.querySelector('.check-box').textContent = nv ? '✓' : '';
  });
  updateProgress();
  const nowDone = isLessonDone(entry);
  btn.classList.toggle('marked', nowDone);
  btn.textContent = nowDone ? '✓ Concluída — clique para desmarcar' : 'Marcar tudo como feito ✓';
  // update lp
  const {total, done} = countLessonChecks(entry);
  const pct = total>0?Math.round(done/total*100):0;
  const lp = document.getElementById('lp-fill');
  if(lp) { lp.style.width=pct+'%'; }
}

let timerSec = 0, timerRunning = false, timerInterval = null;

function timerToggle() {
  const btn = document.getElementById('timer-start-btn');
  if(timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    btn.textContent = '▶';
  } else {
    timerInterval = setInterval(() => {
      timerSec++;
      const m = String(Math.floor(timerSec/60)).padStart(2,'0');
      const s = String(timerSec%60).padStart(2,'0');
      document.getElementById('timer-display').textContent = m+':'+s;
    }, 1000);
    timerRunning = true;
    btn.textContent = '⏸';
  }
}

function timerReset() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSec = 0;
  document.getElementById('timer-display').textContent = '00:00';
  document.getElementById('timer-start-btn').textContent = '▶';
}

function selectInstrument(instrument) {
  activeInstrument = instrument;
  localStorage.setItem('selectedInstrument', instrument);
  COURSE = instrument === 'piano' ? COURSE_PIANO : COURSE_BAIXO;

  const logoSub   = document.querySelector('#sidebar-logo .logo-sub');
  if (instrument === 'piano') {
    logoTitle.textContent = '🎹 CURSO DE PIANO';
    logoSub.textContent   = 'Do Básico ao Profissional';
  } else {
    logoTitle.textContent = '🎸 CURSO DE BAIXO';
    logoSub.textContent   = 'Do Básico ao Profissional';
  }
  buildAllLessons();
  buildSidebar();
  updateProgress();
  showWelcome();
  clUpdateInstrument();
}

// ── CLAUDINHO ─────────────────────────────────────────────────────
const CL_KEY_LS = 'claudinho_apikey';
let clOpen = false;
let clHistory = [];
let clWaiting = false;

function claudinhoToggle() {
  clOpen = !clOpen;
  document.getElementById('claudinho-panel').classList.toggle('open', clOpen);
  if (clOpen) {
    clInit();
    setTimeout(() => document.getElementById('claudinho-input')?.focus(), 260);
  }
}

function clInit() {
  const key = localStorage.getItem(CL_KEY_LS);
  const msgs = document.getElementById('claudinho-messages');
  document.getElementById('claudinho-footer').style.display = key ? 'flex' : 'none';
  if (!key) {
    msgs.innerHTML = '';
    clAddMsg('bot', 'Olá! 👋 Sou o Claudinho, seu assistente musical!\n\nEstou aqui para responder suas dúvidas sobre música, técnica e o conteúdo do curso.\n\nPara me ativar, preciso de uma chave da API da Anthropic:');
    const form = document.createElement('div');
    form.id = 'cl-key-form';
    form.className = 'cl-msg bot';
    form.style.maxWidth = '100%';
    form.innerHTML = `
      <input id="claudinho-apikey-input" type="password" placeholder="sk-ant-api03-..." autocomplete="off" />
      <button id="cl-key-save" onclick="clSaveKey()">Salvar e Começar 🚀</button>
      <a href="https://console.anthropic.com/" target="_blank" id="cl-key-link">Obter chave em console.anthropic.com →</a>`;
    msgs.appendChild(form);
    return;
  }
  if (clHistory.length === 0) clAddMsg('bot', clGreeting());
}

function clSaveKey() {
  const val = (document.getElementById('claudinho-apikey-input')?.value || '').trim();
  if (!val.startsWith('sk-')) { alert('Chave inválida. Deve começar com sk-ant-...'); return; }
  localStorage.setItem(CL_KEY_LS, val);
  document.getElementById('claudinho-messages').innerHTML = '';
  clHistory = [];
  clInit();
}

function clGreeting() {
  const instr = activeInstrument === 'piano' ? 'piano 🎹' : 'baixo 🎸';
  return `Olá! 😊 Sou o Claudinho, seu assistente musical!\n\nEstou aqui para te ajudar com o curso de ${instr} e qualquer dúvida musical. O que você quer saber?`;
}

function clAddMsg(role, text) {
  const msgs = document.getElementById('claudinho-messages');
  const div = document.createElement('div');
  div.className = 'cl-msg ' + role;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function claudinhoKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); clSend(); }
}

async function clSend() {
  if (clWaiting) return;
  const input = document.getElementById('claudinho-input');
  const text = input.value.trim();
  if (!text) return;
  const key = localStorage.getItem(CL_KEY_LS);
  if (!key) { clInit(); return; }

  input.value = '';
  input.style.height = 'auto';
  clAddMsg('user', text);
  clHistory.push({ role: 'user', content: text });

  clWaiting = true;
  document.getElementById('claudinho-send').disabled = true;
  const typing = clAddMsg('bot', 'Claudinho está pensando…');
  typing.classList.add('typing');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 600,
        system: clSystem(),
        messages: clHistory.slice(-12)
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || 'HTTP ' + res.status);
    }
    const data = await res.json();
    const reply = data.content?.[0]?.text || '(sem resposta)';
    typing.classList.remove('typing');
    typing.textContent = reply;
    clHistory.push({ role: 'assistant', content: reply });
    if (clHistory.length > 20) clHistory = clHistory.slice(-20);
  } catch (err) {
    typing.classList.remove('typing');
    if (String(err.message).includes('401') || String(err.message).includes('invalid_api_key')) {
      typing.textContent = '❌ Chave de API inválida. Apague a chave e reconfigure.';
      localStorage.removeItem(CL_KEY_LS);
    } else {
      typing.textContent = '❌ Erro: ' + err.message;
    }
  }

  document.getElementById('claudinho-messages').scrollTop = 99999;
  clWaiting = false;
  document.getElementById('claudinho-send').disabled = false;
  input.focus();
}

function clSystem() {
  const instr = activeInstrument === 'piano' ? 'piano' : 'baixo elétrico';
  let lessonCtx = '';
  if (currentLessonId) {
    const lesson = allLessons.find(l => l.id === currentLessonId);
    if (lesson) lessonCtx = '\nLição atual: "' + lesson.title + '" — ' + lesson.desc;
  }
  const { done, total } = countChecks();
  return 'Você é o Claudinho, um assistente musical simpático e encorajador do site "Leao Music Course".\n' +
    'Responda SEMPRE em português brasileiro. Seja direto, didático e use emojis com moderação.\n' +
    'O estudante está aprendendo ' + instr + '.' + lessonCtx + '\n' +
    'Progresso atual: ' + done + ' de ' + total + ' itens concluídos.\n' +
    'Responda dúvidas sobre música em geral, teoria, técnica e o conteúdo do curso.\n' +
    'Mantenha respostas concisas (máximo 200 palavras), a não ser que o usuário peça mais detalhes.\n' +
    'Não mencione que você é Claude da Anthropic — você é o Claudinho do Leao Music Course.';
}

function clUpdateInstrument() {
  const e = activeInstrument === 'piano' ? '🎹' : '🎸';
  const fab = document.getElementById('claudinho-fab');
  const av  = document.getElementById('claudinho-avatar');
  if (fab) fab.textContent = e;
  if (av)  av.textContent  = e;
}

</script>

<button id="claudinho-fab" onclick="claudinhoToggle()" title="Pergunte ao Claudinho">🎸</button>
<div id="claudinho-panel">
  <div id="claudinho-header">
    <div id="claudinho-avatar">🎸</div>
    <div id="claudinho-header-info">
      <div id="claudinho-header-name">Claudinho</div>
      <div id="claudinho-header-sub">Assistente Musical IA ✨</div>
    </div>
    <button id="claudinho-close" onclick="claudinhoToggle()" title="Fechar">✕</button>
  </div>
  <div id="claudinho-messages"></div>
  <div id="claudinho-footer">
    <textarea id="claudinho-input" placeholder="Pergunte sobre música ou o curso…" rows="1"
      onkeydown="claudinhoKeydown(event)"></textarea>
    <button id="claudinho-send" onclick="clSend()" title="Enviar">➤</button>
  </div>
</div>
