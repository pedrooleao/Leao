<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎸 Curso de Baixo — Do Básico ao Profissional</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --card: #141422;
  --card2: #1a1a2e;
  --border: #252540;
  --border2: #2e2e50;
  --accent: #ff4d1c;
  --accent2: #f5a623;
  --accent3: #3d9bff;
  --green: #22c975;
  --purple: #a855f7;
  --text: #eeedf8;
  --muted: #7070a0;
  --muted2: #9090b8;
  --sidebar-w: 300px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  line-height:1.6;
  display:flex;
  min-height:100vh;
  overflow-x:hidden;
}

/* ─── SIDEBAR ─── */
#sidebar{
  width:var(--sidebar-w);
  min-width:var(--sidebar-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  height:100vh;
  position:fixed;
  top:0; left:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  z-index:50;
  transition:transform 0.3s ease;
}
#sidebar-logo{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#sidebar-logo .logo-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:1px;
  color:var(--text);
  line-height:1;
}
#sidebar-logo .logo-sub{
  font-family:'Space Mono',monospace;
  font-size:9px;
  color:var(--muted);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-top:3px;
}

/* overall progress bar */
#overall-progress{
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.op-label{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:var(--muted);
  font-family:'Space Mono',monospace;
  margin-bottom:6px;
}
.op-bar{
  height:4px;
  background:var(--border);
  border-radius:4px;
  overflow:hidden;
}
.op-fill{
  height:100%;
  background:linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius:4px;
  transition:width 0.5s ease;
}

/* nav tree */
#sidebar-nav{
  flex:1;
  overflow-y:auto;
  padding:8px 0 16px;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
#sidebar-nav::-webkit-scrollbar{width:4px;}
#sidebar-nav::-webkit-scrollbar-track{background:transparent;}
#sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);}

.phase-group{}
.phase-group-header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 20px 6px;
  cursor:pointer;
  user-select:none;
}
.phase-group-header:hover .pgh-label{color:var(--text);}
.pgh-dot{
  width:8px;height:8px;
  border-radius:50%;
  flex-shrink:0;
}
.pgh-label{
  font-family:'Space Mono',monospace;
  font-size:9px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--muted);
  flex:1;
  transition:color 0.2s;
}
.pgh-count{
  font-family:'Space Mono',monospace;
  font-size:9px;
  color:var(--muted);
}
.pgh-arrow{
  font-size:10px;
  color:var(--muted);
  transition:transform 0.2s;
}
.phase-group.collapsed .pgh-arrow{transform:rotate(-90deg);}
.phase-group.collapsed .phase-lessons{display:none;}

.phase-lessons{}
.lesson-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:7px 20px 7px 22px;
  cursor:pointer;
  transition:background 0.15s;
  border-left:2px solid transparent;
}
.lesson-item:hover{background:rgba(255,255,255,0.03);}
.lesson-item.active{
  background:rgba(255,255,255,0.05);
}
.lesson-item.done .li-title{color:var(--muted);}
.li-check{
  width:16px; height:16px;
  border-radius:50%;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  font-size:9px;
  transition:all 0.2s;
}
.lesson-item.done .li-check{
  background:var(--green);
  border-color:var(--green);
  color:#000;
}
.li-title{
  font-size:12px;
  color:var(--muted2);
  flex:1;
  line-height:1.3;
  transition:color 0.2s;
}
.lesson-item.active .li-title{color:var(--text); font-weight:600;}
.li-num{
  font-family:'Space Mono',monospace;
  font-size:9px;
  color:var(--muted);
  flex-shrink:0;
}

/* ─── MAIN ─── */
#main{
  margin-left:var(--sidebar-w);
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* topbar */
#topbar{
  position:sticky;
  top:0;
  z-index:40;
  background:rgba(8,8,16,0.9);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 32px;
  height:56px;
  display:flex;
  align-items:center;
  gap:16px;
}
#menu-btn{
  display:none;
  background:none;border:none;color:var(--text);
  font-size:20px;cursor:pointer;padding:4px;
}
#breadcrumb{
  flex:1;
  font-size:12px;
  color:var(--muted);
  font-family:'Space Mono',monospace;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
  max-width:calc(100vw - 230px);
}
#breadcrumb span{color:var(--text);}

/* timer */
#timer-widget{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
  padding:6px 12px;
}
#timer-display{
  font-family:'Space Mono',monospace;
  font-size:14px;
  color:var(--accent2);
  min-width:50px;
  text-align:center;
}
.timer-btn{
  background:none;border:none;cursor:pointer;
  font-size:14px;padding:2px 4px;
  border-radius:3px;
  transition:background 0.15s;
}
.timer-btn:hover{background:rgba(255,255,255,0.08);}

/* content area */
#content{
  flex:1;
  padding:40px 48px 80px;
  max-width:900px;
}

/* lesson header */
.lesson-header{
  margin-bottom:36px;
}
.lh-phase{
  font-family:'Space Mono',monospace;
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:10px;
}
.lh-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:13px;
  letter-spacing:2px;
  color:var(--muted);
  margin-bottom:6px;
}
.lh-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(36px,5vw,58px);
  line-height:0.95;
  margin-bottom:16px;
}
.lh-desc{
  font-size:16px;
  color:var(--muted2);
  max-width:620px;
  line-height:1.7;
  font-weight:300;
}
.lh-meta{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:16px;
}
.lh-tag{
  font-family:'Space Mono',monospace;
  font-size:10px;
  letter-spacing:1px;
  padding:4px 12px;
  border-radius:2px;
  text-transform:uppercase;
}

/* divider */
.content-divider{
  height:1px;
  background:var(--border);
  margin:32px 0;
}

/* section title */
.section-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:1px;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:10px;
}
.section-title::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}

/* topics grid */
.topics-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:10px;
  margin-bottom:28px;
}
.topic-card{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:14px 16px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
  font-size:13px;
  line-height:1.5;
  transition:border-color 0.2s, transform 0.15s;
}
.topic-card:hover{
  border-color:var(--border2);
  transform:translateY(-1px);
}
.topic-icon{font-size:18px;flex-shrink:0;margin-top:1px;}

/* practice box */
.practice-box{
  padding:20px 22px;
  border-left:3px solid var(--accent);
  background:rgba(255,77,28,0.06);
  border-radius:0 6px 6px 0;
  margin:24px 0;
}
.practice-box.green{border-color:var(--green);background:rgba(34,201,117,0.06);}
.practice-box.blue{border-color:var(--accent3);background:rgba(61,155,255,0.06);}
.practice-box.orange{border-color:var(--accent2);background:rgba(245,166,35,0.06);}
.practice-box.purple{border-color:var(--purple);background:rgba(168,85,247,0.06);}
.pb-label{
  font-family:'Space Mono',monospace;
  font-size:10px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:10px;
}
.practice-box.green .pb-label{color:var(--green);}
.practice-box.blue .pb-label{color:var(--accent3);}
.practice-box.orange .pb-label{color:var(--accent2);}
.practice-box.purple .pb-label{color:var(--purple);}
.practice-box:not([class*='green']):not([class*='blue']):not([class*='orange']):not([class*='purple']) .pb-label{color:var(--accent);}
.pb-text{font-size:14px;color:var(--muted2);line-height:1.75;}

/* refs */
.refs-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:10px;
}
.ref-card{
  padding:14px 16px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
}
.ref-name{font-size:13px;font-weight:600;margin-bottom:4px;}
.ref-desc{font-size:12px;color:var(--muted);line-height:1.4;}

/* checklist */
.checklist{display:flex;flex-direction:column;gap:8px;}
.check-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 16px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
  cursor:pointer;
  transition:all 0.2s;
  user-select:none;
}
.check-item:hover{border-color:var(--border2);background:rgba(255,255,255,.04);}
.check-item.checked{
  background:rgba(34,201,117,0.06);
  border-color:rgba(34,201,117,0.3);
}
.check-box{
  width:18px;height:18px;
  border-radius:4px;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  font-size:11px;
  transition:all 0.2s;
}
.check-item.checked .check-box{
  background:var(--green);
  border-color:var(--green);
  color:#000;
}
.check-text{font-size:13px;line-height:1.4;}
.check-item.checked .check-text{color:var(--muted);text-decoration:line-through;}

/* scale diagram */
.scale-diagram{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:20px;
  font-family:'Space Mono',monospace;
  font-size:13px;
  overflow-x:auto;
  margin:16px 0;
}
.scale-row{
  display:flex;
  align-items:center;
  gap:0;
  margin:4px 0;
}
.string-label{
  width:32px;
  color:var(--muted);
  font-size:11px;
  flex-shrink:0;
}
.fret{
  width:36px;
  height:28px;
  border-right:1px solid var(--border2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  color:var(--muted);
  flex-shrink:0;
}
.fret.root{
  background:var(--accent);
  color:#fff;
  border-radius:3px;
  font-weight:700;
  font-size:10px;
}
.fret.note{
  background:rgba(255,255,255,0.08);
  color:var(--text);
  border-radius:3px;
}
.fret-nums{
  display:flex;
  margin:0 0 8px 32px;
}
.fret-num{
  width:36px;
  text-align:center;
  font-size:10px;
  color:var(--muted);
  flex-shrink:0;
}

/* rhythm boxes */
.rhythm-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin:16px 0;
}
.beat-box{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
  padding:14px 10px;
  text-align:center;
}
.beat-num{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;
  color:var(--accent2);
  line-height:1;
}
.beat-label{font-size:11px;color:var(--muted);margin-top:4px;}

/* nav buttons */
.lesson-nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:48px;
  padding-top:32px;
  border-top:1px solid var(--border);
  gap:16px;
  flex-wrap:wrap;
}
.nav-btn{
  display:flex;
  align-items:center;
  gap:8px;
  padding:12px 20px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text);
  cursor:pointer;
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  transition:all 0.2s;
  text-decoration:none;
}
.nav-btn:hover{border-color:var(--border2);background:var(--card2);}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed;}
.nav-btn.primary{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
  font-weight:600;
}
.nav-btn.primary:hover{background:#e03d10;}
.nav-btn.done-btn{
  background:rgba(34,201,117,0.12);
  border-color:rgba(34,201,117,0.4);
  color:var(--green);
}
.nav-btn.done-btn.marked{
  background:var(--green);
  border-color:var(--green);
  color:#000;
  font-weight:700;
}

/* welcome screen */
#welcome-screen{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:70vh;
  text-align:center;
  padding:40px;
}
.ws-icon{font-size:72px;margin-bottom:24px;}
.ws-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(40px,6vw,72px);
  line-height:0.9;
  margin-bottom:16px;
}
.ws-title span{color:var(--accent);}
.ws-sub{
  font-size:16px;
  color:var(--muted2);
  max-width:500px;
  line-height:1.7;
  margin-bottom:32px;
  font-weight:300;
}
.ws-stats{
  display:flex;
  gap:32px;
  margin-bottom:40px;
  flex-wrap:wrap;
  justify-content:center;
}
.ws-stat{text-align:center;}
.ws-stat-n{
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;
  color:var(--accent);
  line-height:1;
}
.ws-stat-l{
  font-family:'Space Mono',monospace;
  font-size:9px;
  letter-spacing:2px;
  color:var(--muted);
  text-transform:uppercase;
  margin-top:2px;
}
.start-btn{
  padding:16px 40px;
  background:var(--accent);
  border:none;
  border-radius:6px;
  color:#fff;
  font-size:16px;
  font-weight:700;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
  transition:all 0.2s;
  letter-spacing:0.5px;
}
.start-btn:hover{background:#e03d10;transform:translateY(-1px);}
/* instrument selector */
#instrument-select{text-align:center;padding:60px 20px;max-width:640px;margin:0 auto;}
.is-logo{font-size:56px;margin-bottom:16px;}
.is-title{font-size:28px;font-weight:800;letter-spacing:2px;color:var(--text);margin-bottom:0;}
.is-sub{color:var(--muted);margin:8px 0 40px;font-size:15px;}
.is-cards{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;}
.is-card{background:var(--card);border:2px solid var(--border);border-radius:16px;
  padding:36px 32px;cursor:pointer;transition:all .2s;min-width:200px;flex:1;max-width:240px;}
.is-card:hover{border-color:var(--accent3);transform:translateY(-4px);
  box-shadow:0 12px 40px rgba(61,155,255,.2);}
.is-card-icon{font-size:52px;margin-bottom:16px;}
.is-card-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px;}
.is-card-desc{font-size:13px;color:var(--muted);line-height:1.6;}
#switch-instrument{padding:10px 16px;border-bottom:1px solid var(--border);
  font-size:12px;color:var(--muted);cursor:pointer;text-align:center;
  transition:color .15s;user-select:none;}
#switch-instrument:hover{color:var(--text);}



/* phase badge colors */
.fase1{color:var(--green);}
.fase2{color:var(--accent2);}
.fase3{color:var(--accent);}
.fase4{color:var(--accent3);}
.fase1-bg{background:rgba(34,201,117,0.12);color:var(--green);}
.fase2-bg{background:rgba(245,166,35,0.12);color:var(--accent2);}
.fase3-bg{background:rgba(255,77,28,0.12);color:var(--accent);}
.fase4-bg{background:rgba(61,155,255,0.12);color:var(--accent3);}

/* info box */
.info-box{
  background:var(--card2);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:20px 22px;
  margin:20px 0;
  font-size:14px;
  color:var(--muted2);
  line-height:1.75;
}
.info-box strong{color:var(--text);}

/* tip */
.tip{
  display:flex;
  gap:14px;
  padding:16px 18px;
  background:rgba(168,85,247,0.07);
  border:1px solid rgba(168,85,247,0.2);
  border-radius:6px;
  margin:16px 0;
  font-size:13px;
  color:var(--muted2);
  line-height:1.6;
}
.tip-icon{font-size:18px;flex-shrink:0;}

/* progress lesson bar */
.lesson-progress{
  margin-bottom:32px;
  padding:16px 20px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:8px;
  display:flex;
  align-items:center;
  gap:16px;
}
.lp-text{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;white-space:nowrap;}
.lp-bar{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden;}
.lp-fill{height:100%;border-radius:4px;transition:width 0.5s ease;}

/* mobile */
@media(max-width:768px){
  #sidebar{transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);}
  #main{margin-left:0;}
  #menu-btn{display:block;}
  #content{padding:24px 20px 60px;}
  .topics-grid{grid-template-columns:1fr;}
  .rhythm-grid{grid-template-columns:repeat(2,1fr);}
  #sidebar-overlay{display:block;}
  .fretboard-ex{min-width:auto;}
  .fretboard-wrap,.fretboard-wrap-ex{overflow-x:auto;-webkit-overflow-scrolling:touch;}
}
#sidebar-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  z-index:49;
}

/* scrollbar */
body::-webkit-scrollbar{width:6px;}
body::-webkit-scrollbar-track{background:var(--bg);}
body::-webkit-scrollbar-thumb{background:var(--border);}

/* ══ EXERCISE ENGINE ══ */
.exercise-block{background:var(--surface);border:1px solid var(--border2);border-radius:10px;overflow:hidden;margin:28px 0;}
.ex-header{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--card);border-bottom:1px solid var(--border);}
.ex-badge{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;padding:4px 10px;border-radius:3px;text-transform:uppercase;flex-shrink:0;}
.ex-badge.quiz{background:rgba(168,85,247,.15);color:var(--purple);}
.ex-badge.fretboard{background:rgba(61,155,255,.15);color:var(--accent3);}
.ex-badge.rhythm{background:rgba(245,166,35,.15);color:var(--accent2);}
.ex-badge.flashcard{background:rgba(34,201,117,.15);color:var(--green);}
.ex-title{font-size:15px;font-weight:600;flex:1;}
.ex-body{padding:22px 20px;}
.ex-question{font-size:15px;font-weight:600;margin-bottom:16px;line-height:1.5;}
.ex-subtitle{font-size:13px;color:var(--muted2);margin-bottom:14px;}
.ex-progress-bar{height:3px;background:var(--border);border-radius:3px;margin-bottom:14px;overflow:hidden;}
.ex-progress-fill{height:100%;background:var(--purple);border-radius:3px;transition:width .4s ease;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.quiz-opt{padding:12px 16px;background:var(--card2);border:1.5px solid var(--border);border-radius:7px;cursor:pointer;font-size:14px;transition:all .2s;text-align:left;font-family:'DM Sans',sans-serif;color:var(--text);}
.quiz-opt:hover:not(:disabled){border-color:var(--border2);background:rgba(255,255,255,.06);}
.quiz-opt.correct{background:rgba(34,201,117,.14);border-color:var(--green);color:var(--green);}
.quiz-opt.wrong{background:rgba(255,77,77,.12);border-color:#ff4d4d;color:#ff4d4d;}
.quiz-opt:disabled{cursor:default;}
.quiz-feedback{padding:12px 16px;border-radius:7px;font-size:13px;line-height:1.6;margin-bottom:12px;display:none;}
.quiz-feedback.show{display:block;}
.quiz-feedback.ok{background:rgba(34,201,117,.1);border:1px solid rgba(34,201,117,.3);color:var(--green);}
.quiz-feedback.fail{background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.3);color:#ff8888;}
.ex-btn{padding:10px 22px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .2s;}
.ex-btn.next-q{background:var(--accent);color:#fff;}
.ex-btn.next-q:hover{background:#e03d10;}
.ex-btn.restart-q{background:var(--card2);color:var(--muted2);border:1px solid var(--border);}
.ex-result{text-align:center;padding:8px 0;}
.ex-result-num{font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:1;}
.ex-result-label{font-size:13px;color:var(--muted2);margin-bottom:12px;}
.ex-result-msg{font-size:14px;margin-bottom:18px;}
.fretboard-wrap{overflow-x:auto;margin-bottom:16px;}
.fretboard-ex{display:inline-flex;flex-direction:column;gap:2px;padding:14px;background:var(--card2);border-radius:8px;min-width:500px;}
.fb-row-ex{display:flex;align-items:center;}
.fb-sl{width:28px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);text-align:right;padding-right:6px;flex-shrink:0;}
.fb-fr{width:38px;height:34px;border-right:2px solid #3a3a5a;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fb-fr.nut{border-left:5px solid #aaa;}
.fb-fn-row{display:flex;margin-left:28px;}
.fb-fn{width:38px;text-align:center;font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);flex-shrink:0;}
.fb-dot-ex{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.07);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'Space Mono',monospace;transition:all .2s;cursor:pointer;}
.fb-dot-ex:hover{background:rgba(255,255,255,.15);}
.fb-dot-ex.cdot{background:var(--green);border-color:var(--green);color:#fff;animation:fpop .3s ease;}
.fb-dot-ex.wdot{background:#ff4d4d;border-color:#ff4d4d;color:#fff;}
.fb-dot-ex.rdot{background:rgba(34,201,117,.3);border-color:var(--green);color:var(--green);}
@keyframes fpop{0%{transform:scale(.8)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.flashcard-wrap{perspective:1000px;margin-bottom:16px;}
.flashcard-ex{width:100%;height:160px;position:relative;transform-style:preserve-3d;transition:transform .5s ease;cursor:pointer;}
.flashcard-ex.flipped{transform:rotateY(180deg);}
.fc-face-ex{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;border-radius:10px;backface-visibility:hidden;border:1px solid var(--border2);text-align:center;}
.fc-front-ex{background:var(--card2);}
.fc-back-ex{background:var(--card);transform:rotateY(180deg);}
.fc-lbl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.fc-cnt{font-size:clamp(15px,2.5vw,21px);font-weight:700;line-height:1.3;}
.fc-hint{font-size:11px;color:var(--muted);margin-top:8px;}
.fc-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.fc-ctr{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
.fc-rating{display:flex;gap:8px;margin-top:12px;justify-content:center;flex-wrap:wrap;}
.fc-rbtn{padding:8px 14px;border:1px solid var(--border);border-radius:5px;background:var(--card2);color:var(--muted2);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .2s;}
.fc-rbtn:hover{border-color:var(--border2);color:var(--text);}
.rhythm-staff-ex{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:14px;}
.beat-track-ex{display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.beat-cell-ex{width:42px;height:42px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;user-select:none;background:var(--card);font-weight:700;}
.beat-cell-ex.note-beat{background:rgba(61,155,255,.15);border-color:var(--accent3);color:var(--accent3);}
.beat-cell-ex.ghost-beat{background:rgba(255,255,255,.03);border-color:var(--border2);color:var(--muted);}
.beat-cell-ex.playing-beat{background:var(--accent2)!important;border-color:var(--accent2)!important;color:#000!important;transform:scale(1.12);}
.play-btn-ex{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;background:rgba(61,155,255,.12);border:1.5px solid rgba(61,155,255,.3);border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;color:var(--accent3);transition:all .2s;margin-bottom:12px;width:fit-content;}
.play-btn-ex:hover{background:rgba(61,155,255,.2);}
.tap-btn-ex{padding:16px 24px;background:rgba(245,166,35,.15);border:2px solid var(--accent2);border-radius:8px;color:var(--accent2);font-size:16px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:none;margin-left:12px;}
@media(max-width:600px){.quiz-options{grid-template-columns:1fr;}}

/* ── expandable blocks ── */
.expand-block{border:1px solid var(--border);border-radius:6px;margin-bottom:8px;overflow:hidden;}
.expand-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;background:var(--card);border:none;cursor:pointer;text-align:left;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;
  transition:background .15s;gap:12px;}
.expand-toggle:hover{background:var(--card2);}
.expand-toggle-sub{font-size:11px;color:var(--muted);font-weight:400;margin-top:2px;}
.expand-icon{font-size:20px;color:var(--muted);flex-shrink:0;line-height:1;transition:transform .2s;}
.expand-body{padding:18px 20px;background:var(--surface);border-top:1px solid var(--border);
  font-size:14px;color:var(--muted2);line-height:1.8;}
.expand-body strong{color:var(--text);}
.expand-body ul{padding-left:18px;margin-top:6px;}
.expand-body ul li{margin-bottom:6px;}
.expand-body .step{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start;}
.expand-body .step-num{background:var(--accent);color:#fff;font-family:'Space Mono',monospace;
  font-size:11px;font-weight:700;border-radius:50%;width:22px;height:22px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.expand-body .step-txt{flex:1;}
/* ── video button ── */
.video-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;
  background:rgba(61,155,255,.12);border:1px solid rgba(61,155,255,.35);border-radius:6px;
  color:var(--accent3);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;
  transition:all .2s;margin-top:4px;}
.video-btn:hover{background:rgba(61,155,255,.22);border-color:var(--accent3);}
.video-btn.empty{opacity:.4;border-style:dashed;cursor:default;}
.video-btn.yt-search{background:rgba(255,80,80,.10);border-color:rgba(255,80,80,.35);color:#ff6b6b;}
.video-btn.yt-search:hover{background:rgba(255,80,80,.20);border-color:#ff6b6b;}

/* ── CLAUDINHO MASCOTE ──────────────────────────────── */
#claudinho-fab {
  position:fixed;bottom:24px;right:24px;z-index:200;
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;cursor:pointer;font-size:26px;
  box-shadow:0 4px 20px rgba(255,77,28,.4);
  transition:transform .2s,box-shadow .2s;
  animation:cl-pulse 3s ease-in-out infinite;
  display:flex;align-items:center;justify-content:center;
}
#claudinho-fab:hover{transform:scale(1.12);box-shadow:0 6px 28px rgba(255,77,28,.6);}
@keyframes cl-pulse{
  0%,100%{box-shadow:0 4px 20px rgba(255,77,28,.4);}
  50%{box-shadow:0 4px 28px rgba(255,77,28,.7),0 0 0 8px rgba(255,77,28,.08);}
}
#claudinho-panel{
  position:fixed;bottom:96px;right:24px;z-index:199;

  background:var(--card);border:1px solid var(--border2);
  border-radius:16px;display:flex;flex-direction:column;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
  transform:translateY(20px) scale(.96);opacity:0;

}
#claudinho-panel.open{transform:translateY(0) scale(1);opacity:1;pointer-events:all;}
#claudinho-header{
  display:flex;align-items:center;gap:10px;padding:14px 16px;
  border-bottom:1px solid var(--border);border-radius:16px 16px 0 0;
  background:var(--card2);flex-shrink:0;
}
#claudinho-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
#claudinho-header-info{flex:1;}
#claudinho-header-name{font-size:14px;font-weight:700;color:var(--text);}
#claudinho-header-sub{font-size:11px;color:var(--muted);}
#claudinho-close{
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:18px;padding:4px;border-radius:4px;transition:color .15s;
}
#claudinho-close:hover{color:var(--text);}
#claudinho-messages{
  flex:1;overflow-y:auto;padding:14px 14px 6px;
  display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.cl-msg{
  max-width:88%;padding:9px 13px;border-radius:12px;
  font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word;
}
.cl-msg.bot{
  background:var(--card2);color:var(--text);
  border:1px solid var(--border);align-self:flex-start;
  border-radius:4px 12px 12px 12px;
}
.cl-msg.user{
  background:linear-gradient(135deg,rgba(255,77,28,.22),rgba(245,166,35,.18));
  color:var(--text);border:1px solid rgba(255,77,28,.3);
  align-self:flex-end;border-radius:12px 4px 12px 12px;
}
.cl-msg.typing{color:var(--muted);font-style:italic;}
#claudinho-footer{
  padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;
  display:flex;gap:8px;align-items:flex-end;
}
#claudinho-input{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-size:13px;
  padding:8px 12px;resize:none;max-height:80px;min-height:36px;
  font-family:'DM Sans',sans-serif;line-height:1.4;
  transition:border-color .15s;
}
#claudinho-input:focus{outline:none;border-color:var(--accent);}
#claudinho-send{
  width:36px;height:36px;border-radius:8px;flex-shrink:0;
  background:var(--accent);border:none;color:#fff;
  cursor:pointer;font-size:15px;display:flex;
  align-items:center;justify-content:center;transition:background .15s;
}
#claudinho-send:hover{background:var(--accent2);}
#claudinho-send:disabled{opacity:.4;cursor:default;}
#cl-key-form{
  display:flex;flex-direction:column;gap:10px;padding:4px 0;
}
#cl-key-form p{font-size:12px;color:var(--muted2);line-height:1.5;margin:0;}
#claudinho-apikey-input{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:12px;
  padding:9px 12px;font-family:'Space Mono',monospace;
  transition:border-color .15s;
}
#claudinho-apikey-input:focus{outline:none;border-color:var(--accent);}
#cl-key-save{
  width:100%;padding:10px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;font-size:13px;
  font-weight:700;cursor:pointer;transition:background .15s;
}
#cl-key-save:hover{background:var(--accent2);}
#cl-key-link{font-size:11px;color:var(--muted);text-decoration:none;text-align:center;}

@media(max-width:768px){
  #claudinho-panel{width:calc(100vw - 32px);right:16px;bottom:90px;}
  #claudinho-fab{bottom:16px;right:16px;}
}

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- ─── SIDEBAR ─── -->

  <div id="sidebar-logo">
    <div class="logo-title">🎸 CURSO DE BAIXO</div>
    <div class="logo-sub">Do Básico ao Profissional</div>
  </div>
  <div id="switch-instrument" onclick="showInstrumentSelect()">🔄 Trocar instrumento</div>
  <div id="overall-progress">

      <span>PROGRESSO GERAL</span>
      <span id="progress-pct">0%</span>
    </div>

  </div>

</div>

<!-- ─── MAIN ─── -->
<div id="main">
  <div id="topbar">
    <button id="menu-btn" onclick="toggleSidebar()">☰</button>
    <div id="breadcrumb">Selecione uma lição</div>
    <div id="timer-widget">
      <span>⏱</span>
      <span id="timer-display">00:00</span>
      <button class="timer-btn" id="timer-start-btn" onclick="timerToggle()" title="Iniciar/Pausar">▶</button>
      <button class="timer-btn" onclick="timerReset()" title="Resetar">↺</button>
    </div>
  </div>

  <div id="content">
    <!-- welcome or lesson rendered here -->
  </div>
</div>

<script>
// ══════════════════════════════════════════
// EXERCISE ENGINE
// ══════════════════════════════════════════
const EX={
  _qS:{},_qD:{},
  quiz(id,qs){
    const e='EQ'+id;
    this._qS[e]={i:0,sc:0,ans:false,done:false};
    this._qD[e]=qs;
    setTimeout(()=>this._qR(e),30);
    return`<div class="ex-body" id="${e}"><p style="color:var(--muted);font-size:13px">Carregando...</p></div>`;
  },
  _qR(e){
    const el=document.getElementById(e);if(!el)return;
    const s=this._qS[e],qs=this._qD[e];
    if(s.done){
      const p=Math.round(s.sc/qs.length*100);
      const m=p===100?'🏆 Perfeito!':p>=70?'✅ Muito bem! Continue praticando.':p>=40?'📚 Revise o conteúdo e tente novamente.':'💪 Releia a lição com atenção e tente de novo.';
      const _ci=getLessonIndex(currentLessonId),_nl=_ci>=0&&_ci<allLessons.length-1?allLessons[_ci+1]:null,_nb=_nl?`<button class="ex-btn next-q" style="margin-left:8px" onclick="loadLesson('${_nl.id}')">Próxima lição →</button>`:'';el.innerHTML=`<div class="ex-result"><div class="ex-result-num" style="color:${p>=70?'var(--green)':'var(--accent)'}">${s.sc}/${qs.length}</div><div class="ex-result-label">acertos — ${p}%</div><div class="ex-result-msg">${m}</div><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button class="ex-btn restart-q" onclick="EX._qRst('${e}')">↺ Tentar novamente</button>${_nb}</div></div>`;
      try{localStorage.setItem('exs_'+e,s.sc+'/'+qs.length);}catch(x){}
      updateProgress();return;
    }
    const q=qs[s.i],pr=Math.round(s.i/qs.length*100);
    el.innerHTML=`<div class="ex-progress-bar"><div class="ex-progress-fill" style="width:${pr}%"></div></div>
      <p style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:10px">PERGUNTA ${s.i+1} DE ${qs.length}</p>
      <div class="ex-question">${q.q}</div>${q.sub?`<div class="ex-subtitle">${q.sub}</div>`:''}
      <div class="quiz-options">${q.o.map((x,i)=>`<button class="quiz-opt" onclick="EX._qA('${e}',${i})" id="${e}o${i}">${x}</button>`).join('')}</div>
      <div class="quiz-feedback" id="${e}fb"></div>
      <div style="text-align:right;margin-top:6px"><button class="ex-btn next-q" id="${e}nx" onclick="EX._qN('${e}')" style="display:none">${s.i<qs.length-1?'Próxima →':'Ver resultado'}</button></div>`;
  },
  _qA(e,ch){
    const s=this._qS[e];if(s.ans)return;s.ans=true;
    const q=this._qD[e][s.i],ok=ch===q.c;if(ok)s.sc++;
    for(let i=0;i<q.o.length;i++){const b=document.getElementById(e+'o'+i);if(b){b.disabled=true;if(i===q.c)b.classList.add('correct');else if(i===ch&&!ok)b.classList.add('wrong');}}
    const fb=document.getElementById(e+'fb');
    if(fb){fb.textContent=(ok?'✓ '+(q.ok||'Correto!'):'✗ '+(q.fail||'Resposta correta: '+q.o[q.c]));fb.className='quiz-feedback show '+(ok?'ok':'fail');}
    const nx=document.getElementById(e+'nx');if(nx)nx.style.display='inline-block';
  },
  _qN(e){const s=this._qS[e],qs=this._qD[e];s.i++;s.ans=false;if(s.i>=qs.length)s.done=true;this._qR(e);},
  _qRst(e){this._qS[e]={i:0,sc:0,ans:false,done:false};this._qR(e);},

  _fS:{},_fD:{},
  fretboard(id,chs){
    const e='EF'+id;
    this._fS[e]={i:0,sc:0,done:false,sel:false};
    this._fD[e]=chs;
    setTimeout(()=>this._fR(e),30);
    return`<div class="ex-body" id="${e}"><p style="color:var(--muted);font-size:13px">Carregando...</p></div>`;
  },
  _fR(e){
    const el=document.getElementById(e);if(!el)return;
    const s=this._fS[e],chs=this._fD[e];
    if(s.done){
      const p=Math.round(s.sc/chs.length*100);
      el.innerHTML=`<div class="ex-result"><div class="ex-result-num" style="color:${p>=70?'var(--green)':'var(--accent)'}">${s.sc}/${chs.length}</div><div class="ex-result-label">notas corretas no braço</div><div class="ex-result-msg">${p>=70?'🎸 Excelente leitura do braço!':'📍 Continue memorizando as posições das notas.'}</div><button class="ex-btn restart-q" onclick="EX._fRst('${e}')">↺ Tentar novamente</button></div>`;return;
    }
    const ch=chs[s.i];
    const strs=['Sol','Ré','Lá','Mi'],ops=['G','D','A','E'];
    const AN=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const nAt=(o,f)=>AN[(AN.indexOf(o)+f)%12];
    const pr=Math.round(s.i/chs.length*100);
    let fb=`<div class="fretboard-ex"><div class="fb-fn-row"><div style="width:28px"></div>${Array.from({length:13},(_,i)=>`<div class="fb-fn">${i}</div>`).join('')}</div>`;
    strs.forEach((str,si)=>{
      fb+=`<div class="fb-row-ex"><div class="fb-sl">${str}</div>`;
      for(let f=0;f<=12;f++){const note=nAt(ops[si],f);fb+=`<div class="fb-fr${f===0?' nut':''}"><div class="fb-dot-ex" id="${e}s${si}f${f}" onclick="EX._fC('${e}',${si},${f},'${note}')"></div></div>`;}
      fb+=`</div>`;
    });
    fb+=`</div>`;
    el.innerHTML=`<div class="ex-progress-bar"><div class="ex-progress-fill" style="width:${pr}%"></div></div>
      <p style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:10px">DESAFIO ${s.i+1} DE ${chs.length}</p>
      <div class="ex-question">Encontre a nota <strong style="color:var(--accent3);font-size:20px">${ch.n}</strong> na corda <strong>${strs[ch.s]}</strong></div>
      <div class="ex-subtitle">Clique no ponto correto do braço 👇</div>
      <div class="fretboard-wrap">${fb}</div>
      <div class="quiz-feedback" id="${e}fb"></div>
      <button class="ex-btn next-q" id="${e}nx" onclick="EX._fN('${e}')" style="display:none;margin-top:10px">${s.i<chs.length-1?'Próximo →':'Ver resultado'}</button>`;
  },
  _fC(e,si,fi,note){
    const s=this._fS[e];if(s.sel)return;s.sel=true;
    const ch=this._fD[e][s.i],ok=ch.s===si&&ch.f===fi;if(ok)s.sc++;
    const d=document.getElementById(e+'s'+si+'f'+fi);if(d){d.classList.add(ok?'cdot':'wdot');d.textContent=note;}
    if(!ok){const cd=document.getElementById(e+'s'+ch.s+'f'+ch.f);if(cd){cd.classList.add('rdot');cd.textContent=ch.n;}}
    const fb=document.getElementById(e+'fb');
    if(fb){fb.textContent=ok?`✓ Correto! ${note} — corda ${['Sol','Ré','Lá','Mi'][si]}, casa ${fi}.`:`✗ Era casa ${ch.f} da corda ${['Sol','Ré','Lá','Mi'][ch.s]}.`;fb.className='quiz-feedback show '+(ok?'ok':'fail');}
    const nx=document.getElementById(e+'nx');if(nx)nx.style.display='inline-block';
  },
  _fN(e){const s=this._fS[e],d=this._fD[e];s.i++;s.sel=false;if(s.i>=d.length)s.done=true;this._fR(e);},
  _fRst(e){this._fS[e]={i:0,sc:0,done:false,sel:false};this._fR(e);},

  _cS:{},_cD:{},
  flashcard(id,cards){
    const e='EC'+id;
    this._cS[e]={i:0,flip:false,known:[],unk:[]};
    this._cD[e]=[...cards];
    setTimeout(()=>this._cR(e),30);
    return`<div class="ex-body" id="${e}"><p style="color:var(--muted);font-size:13px">Carregando...</p></div>`;
  },
  _cR(e){
    const el=document.getElementById(e);if(!el)return;
    const s=this._cS[e],cs=this._cD[e];
    if(s.i>=cs.length){
      const k=s.known.length,u=s.unk.length;
      el.innerHTML=`<div class="ex-result"><div class="ex-result-num" style="color:var(--green)">${k}</div><div class="ex-result-label">de ${cs.length} conceitos dominados</div><div class="ex-result-msg">${u>0?`📚 Estude mais os ${u} que não soube.`:'🏆 Você domina todos os conceitos!'}</div><div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><button class="ex-btn restart-q" onclick="EX._cRst('${e}')">↺ Revisar tudo</button>${u>0?`<button class="ex-btn next-q" onclick="EX._cWrong('${e}')">Revisar erros (${u})</button>`:''}</div></div>`;return;
    }
    const c=cs[s.i];
    el.innerHTML=`<div class="fc-nav"><span class="fc-ctr">${s.i+1}/${cs.length}</span><span style="font-size:11px;color:var(--muted)">Clique para revelar</span></div>
      <div class="flashcard-wrap"><div class="flashcard-ex${s.flip?' flipped':''}" onclick="EX._cFlip('${e}')">
        <div class="fc-face-ex fc-front-ex"><div class="fc-lbl">Conceito</div><div class="fc-cnt">${c.f}</div><div class="fc-hint">Toque para revelar</div></div>
        <div class="fc-face-ex fc-back-ex"><div class="fc-lbl">Resposta</div><div class="fc-cnt" style="font-size:clamp(12px,2vw,15px);font-weight:400">${c.b}</div></div>
      </div></div>
      ${s.flip?`<div class="fc-rating">
        <button class="fc-rbtn" style="border-color:rgba(255,77,77,.4);color:#ff4d4d" onclick="EX._cRate('${e}',false)">😕 Não sei</button>
        <button class="fc-rbtn" style="border-color:rgba(245,166,35,.4);color:var(--accent2)" onclick="EX._cRate('${e}',true)">🤔 Mais ou menos</button>
        <button class="fc-rbtn" style="border-color:rgba(34,201,117,.4);color:var(--green)" onclick="EX._cRate('${e}',true)">✓ Sei bem!</button>
      </div>`:'<div style="height:44px"></div>'}`;
  },
  _cFlip(e){this._cS[e].flip=!this._cS[e].flip;this._cR(e);},
  _cRate(e,k){const s=this._cS[e],cs=this._cD[e];if(k)s.known.push(cs[s.i]);else s.unk.push(cs[s.i]);s.i++;s.flip=false;this._cR(e);},
  _cRst(e){const cs=[...this._cD[e]];this._cS[e]={i:0,flip:false,known:[],unk:[]};this._cR(e);},
  _cWrong(e){const u=[...this._cS[e].unk];this._cD[e]=u;this._cS[e]={i:0,flip:false,known:[],unk:[]};this._cR(e);},

  _rS:{},_rP:{},
  rhythm(id,pat,bpm){
    const e='ER'+id;
    this._rS[e]={on:false,int:null,beat:-1,bpm:bpm||80,hits:[]};
    this._rP[e]=pat;
    setTimeout(()=>this._rRen(e,pat,bpm||80),30);
    return`<div class="ex-body" id="${e}"></div>`;
  },
  _rRen(e,pat,bpm){
    const el=document.getElementById(e);if(!el)return;
    el.innerHTML=`<div class="ex-question">Exercício Rítmico — acompanhe o padrão</div>
      <div class="ex-subtitle">Pressione <strong>🥁 TAP</strong> nas células azuis. As cinzas são ghost notes.</div>
      <div class="rhythm-staff-ex">
        <div class="beat-track-ex" id="${e}tr">${pat.map((b,i)=>`<div class="beat-cell-ex ${b.t==='note'?'note-beat':b.t==='ghost'?'ghost-beat':''}" id="${e}b${i}">${b.l}</div>`).join('')}</div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span style="font-family:'Space Mono',monospace;font-size:12px;color:var(--muted2)">BPM: <strong id="${e}bl">${bpm}</strong></span>
          <input type="range" min="40" max="160" value="${bpm}" oninput="EX._rBpm('${e}',+this.value)" style="accent-color:var(--accent2);cursor:pointer">
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <button class="play-btn-ex" id="${e}pb" onclick="EX._rTog('${e}')">▶ Iniciar metrônomo</button>
        <button class="tap-btn-ex" id="${e}tb" onclick="EX._rTap('${e}')">🥁 TAP</button>
      </div>
      <div id="${e}res" style="font-size:13px;color:var(--muted2);min-height:20px;margin-top:8px"></div>`;
  },
  _rBpm(e,v){const s=this._rS[e];s.bpm=v;const l=document.getElementById(e+'bl');if(l)l.textContent=v;if(s.on){this._rStop(e);this._rStart(e);}},
  _rTog(e){const s=this._rS[e];if(s.on)this._rStop(e);else this._rStart(e);},
  _rStart(e){
    const s=this._rS[e],pat=this._rP[e];
    s.on=true;s.beat=-1;s.hits=[];
    const pb=document.getElementById(e+'pb'),tb=document.getElementById(e+'tb');
    if(pb)pb.textContent='⏹ Parar';if(tb)tb.style.display='inline-block';
    const ms=Math.round(60000/s.bpm);
    s.int=setInterval(()=>{s.beat=(s.beat+1)%pat.length;pat.forEach((_,i)=>{const c=document.getElementById(e+'b'+i);if(c)c.classList.toggle('playing-beat',i===s.beat);});},ms);
  },
  _rStop(e){
    const s=this._rS[e],pat=this._rP[e];
    clearInterval(s.int);s.on=false;s.beat=-1;
    const pb=document.getElementById(e+'pb'),tb=document.getElementById(e+'tb');
    if(pb)pb.textContent='▶ Iniciar metrônomo';if(tb)tb.style.display='none';
    pat.forEach((_,i)=>{const c=document.getElementById(e+'b'+i);if(c)c.classList.remove('playing-beat');});
    const res=document.getElementById(e+'res');
    if(res&&s.hits.length>0){const ok=s.hits.filter(h=>h).length,p=Math.round(ok/s.hits.length*100);res.innerHTML=`<span style="color:${p>=70?'var(--green)':'var(--accent2)'}">Precisão: ${p}% (${ok}/${s.hits.length} batidas no tempo certo)</span>`;}
  },
  _rTap(e){
    const s=this._rS[e],pat=this._rP[e];if(!s.on)return;
    const ok=pat[s.beat]&&pat[s.beat].t==='note';s.hits.push(ok);
    const tb=document.getElementById(e+'tb');
    if(tb){tb.style.background=ok?'rgba(34,201,117,.3)':'rgba(255,77,77,.3)';setTimeout(()=>{if(tb)tb.style.background='rgba(245,166,35,.15)';},150);}
  },

  build(type,id,title,data,bpm){
    const lbl={quiz:'Quiz',fretboard:'Braço do Baixo',flashcard:'Flashcards',rhythm:'Exercício Rítmico'};
    let body='';
    if(type==='quiz')body=this.quiz(id,data);
    else if(type==='fretboard')body=this.fretboard(id,data);
    else if(type==='flashcard')body=this.flashcard(id,data);
    else if(type==='rhythm')body=this.rhythm(id,data,bpm);
    return`<div class="exercise-block"><div class="ex-header"><span class="ex-badge ${type}">${lbl[type]||type}</span><span class="ex-title">${title}</span></div>${body}</div>`;
  }
};

            </div>
          </div>
          <div class="content-divider"></div>
          <div class="section-title">🎼 As 4 Cordas do Baixo</div>
          <div class="info-box">O baixo padrão tem <strong>4 cordas</strong>, afinadas da mais grossa para a mais fina:<br><br><strong>Mi (E)</strong> — corda mais grossa, som mais grave, 1.ª corda de cima<br><strong>Lá (A)</strong> — segunda corda<br><strong>Ré (D)</strong> — terceira corda<br><strong>Sol (G)</strong> — corda mais fina, som mais agudo, 1.ª corda de baixo<br><br>Memorize: <em>Mi-Lá-Ré-Sol</em> (E-A-D-G). Frase: <strong>"Estudar Até Dominar o Groove"</strong>.
          </div>
          <div class="content-divider"></div>
          <div class="section-title">🔧 Regulagem Básica</div>
          <div class="info-box">A regulagem é o ajuste fino que torna o instrumento confortável e afinado. Conheça cada parâmetro — mas leve a um luthier se tiver dúvida.</div>
          <div class="expand-block">
            <button class="expand-toggle" onclick="toggleExpand('reg-acao')">
              <span><strong>🎚️ Ação das Cordas</strong><br><span class="expand-toggle-sub">Distância das cordas ao braço — conforto vs volume</span></span>

            </button>
            <div class="expand-body" id="reg-acao" style="display:none">
              <strong>O que é:</strong> a altura das cordas em relação às casas. Alta = mais volume e menos zumbido, mas cansa a mão. Baixa = toque mais fácil e rápido, mas pode zunir.<br><br><strong>Como medir:</strong> use uma régua de feeler gauge (calibrador de folga) na 12.ª casa entre a corda e a pestana. Referência: ~1,5–2,0 mm no Mi, ~1,2–1,5 mm no Sol.<br><br><strong>Como ajustar:</strong> no cavalete, cada saddle tem um parafuso allen de altura. Gire no sentido horário para subir, anti-horário para baixar. Ajuste um pouco de cada vez e toque para testar.
            </div>
          </div>
          <div class="expand-block">
            <button class="expand-toggle" onclick="toggleExpand('reg-trussrod')">
              <span><strong>⚙️ Truss Rod</strong><br><span class="expand-toggle-sub">Curvatura do braço — o ajuste mais delicado</span></span>
              <span class="expand-icon">+</span>
            </button>
            <div class="expand-body" id="reg-trussrod" style="display:none">
              <strong>O que é:</strong> o braço deve ter uma curvatura levíssima (relief) para as cordas vibrarem sem bater nas casas intermediárias.<br><br><strong>Como verificar:</strong> prenda a 1.ª e a 12.ª casa simultaneamente e observe o espaço entre a corda e a 7.ª casa. Deve haver cerca de 0,2–0,3 mm.<br><br><strong>Como ajustar:</strong><br><div class="step"><div class="step-num">1</div><div class="step-txt">Localize a porca do truss rod (geralmente na cabeça do braço, atrás da nut, ou no talão).</div></div><div class="step"><div class="step-num">2</div><div class="step-txt">Use a chave allen correta (4 mm é comum no Fender).</div></div><div class="step"><div class="step-num">3</div><div class="step-txt">Gire <strong>1/4 de volta por vez</strong>. Horário = aperta (menos curvatura). Anti-horário = solta (mais curvatura).</div></div><div class="step"><div class="step-num">4</div><div class="step-txt">Aguarde pelo menos 15 minutos (ou até horas) para o braço reagir antes de girar novamente.</div></div><strong>NUNCA force além de 1/4 de volta por sessão. Em caso de dúvida, leve ao luthier.</strong>

              <strong>O que é:</strong> intonação correta significa que a <strong>12.ª casa afina exatamente 1 oitava acima da corda solta</strong>. Se a 12.ª estiver mais aguda = saddle para frente. Mais grave = saddle para trás.<br><br><strong>Como verificar:</strong><br><div class="step"><div class="step-num">1</div><div class="step-txt">Ligue o afinador cromático e toque a corda solta — afine perfeitamente.</div></div><div class="step"><div class="step-num">2</div><div class="step-txt">Toque a mesma corda pressionando a 12.ª casa.</div></div><div class="step"><div class="step-num">3</div><div class="step-txt">Compare: se a 12.ª está mais aguda, mova o saddle para longe do braço (aumenta a escala). Se mais grave, aproxime.</div></div><div class="step"><div class="step-num">4</div><div class="step-txt">Repita para cada corda. Esse processo exige paciência e é feito com cordas novas.</div></div>

              <strong>Material:</strong> pano de microfibra seco (sem produtos químicos nas cordas).<br><br><strong>Como fazer:</strong> Após tocar, envolva cada corda com o pano e deslize de uma ponta à outra, passando por baixo e por cima. Remove suor, óleo e sujeira que oxidam o aço.<br><br><strong>Produto extra:</strong> spray de limpeza de cordas (ex: GHS Fast Fret, Dunlop 65 String Cleaner) aplicado no pano — não diretamente na corda.<br><br><strong>Quando trocar:</strong> cordas mortas soam sem brilho, ficam escuras e perdem sustain. Em geral: <strong>a cada 3–6 meses</strong> de uso regular, ou quando sentir que o som mudou.

            <div class="expand-body" id="afin-clip" style="display:none">
              <strong>Como funciona:</strong> o afinador detecta a vibração mecânica da madeira via clipe na cabeça do braço — não precisa de microfone.<br><br><strong>Passo a passo:</strong><br><div class="step"><div class="step-num">1</div><div class="step-txt">Prenda o afinador na cabeça do braço. Ligue-o e certifique que está em modo cromático (mostra qualquer nota, não apenas de um instrumento específico).</div></div><div class="step"><div class="step-num">2</div><div class="step-txt">Toque a corda <strong>Mi (E)</strong> solta com firmeza. O display mostrará a nota mais próxima.</div></div><div class="step"><div class="step-num">3</div><div class="step-txt">Observe o indicador: agulha ou barra à <strong>esquerda = corda baixa</strong> (gire a tarraxa para aumentar tensão). À <strong>direita = corda alta</strong> (diminua a tensão).</div></div><div class="step"><div class="step-num">4</div><div class="step-txt">Quando o indicador estiver centralizado e verde, a nota está afinada. Repita para Lá (A), Ré (D) e Sol (G).</div></div><div class="step"><div class="step-num">5</div><div class="step-txt"><strong>Dica importante:</strong> sempre chegue na nota <em>subindo</em> a tensão (de baixo para cima). Se ultrapassar, abaixe um pouco além e suba novamente — evita escorregamento da tarraxa.</div></div><strong>Afinadores recomendados:</strong> Korg PC-1, Snark SN-8, TC Electronic PolyTune Clip.

          <div class="section-title">🧍 Postura em Pé</div>

        title: 'Tom do Baixo — EQ, Compressão e Identidade Sonora',
        desc: 'Seu som é sua assinatura. Entender equalização, compressão e a física do baixo te dá controle total sobre como você soa — e ajuda a se expressar melhor musicalmente.',
        video: '',
        content: () => `
          <div class="section-title">🎚️ Tom do Baixo — Construindo Sua Assinatura Sonora</div>
          <div class="info-box">
            <strong>O som começa antes do amplificador.</strong><br><br>
            Muitos baixistas passam anos buscando "o tom" no equipamento quando ele começa nas mãos, nas cordas e no instrumento. Mas entender equalização, compressão e as características físicas do seu baixo te dá o vocabulário para moldar seu som conscientemente — em qualquer situação, em qualquer equipamento.
          </div>

          <div class="expand-block">
            <button class="expand-toggle" onclick="toggleExpand('m20-eq')">
              <span><strong>🎚️ Equalização: Moldando Seu Som</strong><br>
              <span class="expand-toggle-sub">O que cada faixa de frequência faz no baixo</span></span>
              <span class="expand-icon">+</span>
            </button>
            <div class="expand-body" id="m20-eq" style="display:none">
              <p>O EQ (equalizador) permite amplificar ou cortar faixas de frequência específicas do seu som. Entender o que cada região faz é fundamental para ter controle real sobre seu tom.</p>
              <p><strong>Mapa de frequências do baixo elétrico:</strong></p>
              <ul>
                <li><strong>Sub-graves (20–60 Hz):</strong> O "rrrumble" físico — sente-se no peito antes de ouvir. Dá peso e impacto em sistemas de som grandes. Em excesso, turva o mix e come headroom sem adicionar clareza. Em home studio: geralmente corte abaixo de 40 Hz com high-pass filter.</li>
                <li><strong>Graves (60–120 Hz):</strong> O corpo e o calor do baixo. A maior parte do "grave" que você ouve está aqui. Boostar 80–100 Hz adiciona "gordura". Cortar limpa o mix mas pode deixar o baixo fino.</li>
                <li><strong>Médio-graves (120–300 Hz):</strong> O "borrão" do baixo. Excesso aqui cria aquela sensação de "enlameado" ou "nasal". Pequenos cortes nessa região (1–3 dB) geralmente melhoram a clareza sem tirar o corpo.</li>
                <li><strong>Médios (300 Hz–1 kHz):</strong> A presença e a "punch" do baixo. Importante para o baixo cortar no mix. Fretless e upright vivem aqui. Slap precisa de presença em torno de 700–800 Hz.</li>
                <li><strong>Médio-agudos (1–4 kHz):</strong> Definição do ataque, clareza das notas, "nariz" do instrumento. Fundamental para o baixo ser ouvido em mixes densos com guitarra e teclados.</li>
                <li><strong>Ar (4 kHz+):</strong> Fret noise, clique da palheta, brilho das cordas novas. Em excesso, soa metálico e duro. Em falta, o baixo soa "enterrado" e sem articulação.</li>
              </ul>
              <p><strong>Regra prática:</strong> Corte sempre antes de amplificar. Um corte cirúrgico de 2–3 dB em uma frequência problemática melhora mais o som do que boostar 6 dB em outra região.</p>
            </div>
          </div>

          <div class="expand-block">
            <button class="expand-toggle" onclick="toggleExpand('m20-compressao')">
              <span><strong>🔊 Compressão para Baixistas</strong><br>
              <span class="expand-toggle-sub">O que é, como funciona e como usar no groove</span></span>
              <span class="expand-icon">+</span>
            </button>
            <div class="expand-body" id="m20-compressao" style="display:none">
              <p>O compressor é provavelmente o processador mais importante para o baixista depois do próprio amplificador. Ele iguala as dinâmicas — as notas mais fortes ficam menos altas, as mais suaves ficam mais audíveis. O resultado é um som mais consistente, mais "gordo" e que assenta melhor no mix.</p>
              <p><strong>Os 4 parâmetros fundamentais (explicados simplesmente):</strong></p>
              <ul>
                <li><strong>Threshold:</strong> O "gatilho". Quando o sinal do baixo ultrapassa esse nível, o compressor começa a agir. Abaixo do threshold = sem compressão. Acima = comprimido. Coloque mais baixo para mais compressão, mais alto para menos.</li>
                <li><strong>Ratio:</strong> "Quanto comprime". Um ratio de 4:1 significa: para cada 4 dB que o sinal sobe acima do threshold, apenas 1 dB passa. Ratio 2:1 = suave e musical. Ratio 8:1+ = compressão forte, som "pumping".</li>
                <li><strong>Attack:</strong> O tempo que o compressor leva para "reagir" ao sinal acima do threshold. Attack rápido (1–3ms): comprime o transiente do ataque — som mais controlado mas menos punch. Attack lento (20–50ms): deixa o transiente passar — preserva o "dig" da nota.</li>
                <li><strong>Release:</strong> O tempo que o compressor leva para "soltar" depois que o sinal cai abaixo do threshold. Release curto = compressor reage rápido, pode criar "pumping" rítmico (pode ser musical!). Release longo = compressor segura mais tempo, som mais suave e sustentado.</li>
              </ul>
              <p><strong>Configuração prática para groove:</strong> Threshold moderado (o medidor de ganho reduzido mostrando 3–6 dB de compressão). Ratio 4:1. Attack 15–25ms (deixa o ataque passar). Release 60–100ms. Makeup gain para compensar o volume perdido. Transparente — você não deve "ouvir" o compressor, deve "sentir" o groove mais gordo e consistente.</p>
              <p><strong>Pedais recomendados:</strong> MXR M87 (muito musical, transparente), Empress Compressor (parâmetros completos, referência pro), Cali76 (baseado no clássico UREI 1176, muito punch). Para começar: MXR M87 ou Diamond Bass Compressor.</p>
            </div>
          </div>

          <div class="expand-block">
            <button class="expand-toggle" onclick="toggleExpand('m20-identidade')">
              <span><strong>🎸 Encontrando Sua Identidade Sonora</strong><br>

            </button>
            <div class="expand-body" id="m20-identidade" style="display:none">
              <p>Todo grande baixista tem um som que você reconhece em segundos. Isso não acontece por acaso — é o resultado de escolhas conscientes e anos de desenvolvimento. Estudar essas escolhas te dá vocabulário para construir a sua.</p>
              <p><strong>Baixistas com sons únicos e o que os define:</strong></p>
              <ul>
                <li><strong>Jaco Pastorius:</strong> Fretless com cordas roundwound, ataque de dedo muito próximo do cavalete, sem trastes = mwah característico. Compressor leve, sem distorção. Som limpo, cristalino, quase de guitarra solista. Referência: "Teen Town", "Donna Lee".</li>
                <li><strong>Geddy Lee (Rush):</strong> Rickenbacker com treble extremamente presente, bitola leve, pick (palheta). O "snarl" (rosnado) dos médio-agudos é sua marca. Distorção leve em overdrive. Definição cirúrgica mesmo nos riffs mais rápidos.</li>
                <li><strong>Marcus Miller:</strong> Jazz Bass com bateria de pré-amp ativo, cordas roundwound novas, slap com bofetada forte. EQ com graves profundos e presença nos agudos — o "smile curve" do equalizador. Som gordo, percussivo, inconfundível.</li>
                <li><strong>Paul McCartney:</strong> Hofner 500/1 (semi-hollow, curto) com cordas flatwound e felt muted — o som "vintage" dos Beatles. Warm, redondo, sem transientes duros. O oposto de Marcus Miller em termos de EQ, mas igualmente icônico.</li>
                <li><strong>Victor Wooten:</strong> Fodera com electronics personalizados, técnica de double thumb, harmônicos. Som ultra-limpo com dinâmica enorme — sem compressor nos shows ao vivo.</li>
              </ul>
              <p><strong>Como encontrar o que você quer soar:</strong></p>
              <ul>
                <li>Liste 5 baixistas que você ama e descreva o som de cada um em palavras</li>

                <li>Experimente: cordas diferentes, técnicas diferentes, posição de ataque diferente</li>
              </ul>
            </div>
          </div>

          <div class="expand-block">
            <button class="expand-toggle" onclick="toggleExpand('m20-instrumento')">
              <span><strong>🪵 Seu Instrumento e Como Ele Soa</strong><br>
              <span class="expand-toggle-sub">Cordas, pickups, madeira e manutenção — a física do tom</span></span>

            </button>
            <div class="expand-body" id="m20-instrumento" style="display:none">
              <p>Antes do amplificador, antes do pedal, antes do EQ — o tom começa no instrumento. Entender as variáveis físicas do seu baixo te dá controle sobre a matéria-prima do seu som.</p>
              <p><strong>Cordas: roundwound vs flatwound</strong></p>
              <ul>
                <li><strong>Roundwound (enrolamento redondo):</strong> O padrão atual. Som brilhante, com presença nos agudos, muito fret noise. Ideais para slap, rock, funk, jazz moderno. Vida útil: 2–4 semanas de uso intenso antes de escurecer.</li>
                <li><strong>Flatwound (enrolamento plano):</strong> Superfície lisa. Som escuro, warm, vintage — como Paul McCartney e James Jamerson. Sem fret noise. Duradouríssimas (anos). Ideais para blues, jazz tradicional, R&amp;B vintage. Sensação suave para os dedos.</li>
                <li><strong>Halfwound / groundwound:</strong> Meio-termo entre as duas. Som semi-brilhante com menos fret noise. Versáteis.</li>
              </ul>
              <p><strong>Pickups: Jazz Bass vs Precision Bass</strong></p>
              <ul>
                <li><strong>Precision (split-coil):</strong> Som mais gordo, médio-grave proeminente, "punch" no ataque. Hum-cancelling. O som de Jamerson, Tony Levin, Sting. Mais "redondo" e assertivo.</li>
                <li><strong>Jazz Bass (dois single-coil):</strong> Com ambos abertos: som mais brilhante, nasal, articulado. Ponte sozinha: mais treble e nariz. Pescoço sozinho: mais warm. Jaco, Marcus Miller, Geddy Lee usam Jazz Bass.</li>
              </ul>
              <p><strong>Madeira e construção:</strong> Alder (amieiro) é a madeira padrão dos Fenders — balanceada. Ash é mais brilhante com mais ataque. Mahogany é mais escura e sustentada (Gibson). O braço também importa: maple = mais brilhante e definido; rosewood = mais warm. A construção (bolt-on, neck-through, set-neck) afeta o sustain e o punch do ataque.</p>
              <p><strong>Manutenção básica para preservar o tom:</strong> Limpe as cordas após cada uso com pano seco. Lubrifique as cravelhas a cada 6 meses. Mantenha a ação (height das cordas) regulada — muito alta = difícil de tocar; muito baixa = fret buzz. Setup profissional anual é investimento que vale.</p>
            </div>
          </div>

      {
        id: 'f4m21', num: 'M21',
        title: 'Preparação Mental — Tocando Sob Pressão',
        desc: 'Tocar bem ensaiado é uma coisa. Tocar bem quando importa — em público, numa audição, numa gravação — é outra. A preparação mental é uma habilidade que se treina.',

        content: () => `
          <div class="section-title">🧠 Preparação Mental para Músicos</div>
          <div class="info-box">
            <strong>Por que músicos travam?</strong><br><br>
            Você ensaiou durante semanas, sabe o repertório de trás para frente — mas na hora do show, a mente trava, os dedos travam, o groove some. Isso não é falta de preparo técnico. É falta de preparo <em>mental</em>. A boa notícia: preparação mental é uma habilidade como qualquer outra — ela se treina.

          <div class="expand-block">
            <button class="expand-toggle" onclick="toggleExpand('m21-ansiedade')">
              <span><strong>😰 Ansiedade e Como Domá-la</strong><br>
              <span class="expand-toggle-sub">A fisiologia do nervosismo e como transformá-lo em combustível</span></span>
              <span class="expand-icon">+</span>
            </button>
            <div class="expand-body" id="m21-ansiedade" style="display:none">
              <p><strong>O que acontece fisiologicamente:</strong> A ansiedade de performance é a resposta de "luta ou fuga" do sistema nervoso autônomo. Adrenalina aumenta a frequência cardíaca, tensa os músculos (inclusive os das mãos), acelera o pensamento e reduz a coordenação motora fina. Para um baixista, isso significa dedos tensos, timing irregular e mente "em branco".</p>
              <p><strong>Por que músicos são especialmente vulneráveis:</strong> Diferente de um atleta que usa a tensão muscular extra, o músico precisa de precisão motora fina, relaxamento e fluxo cognitivo. A adrenalina age contra exatamente o que você precisa.</p>
              <p><strong>O reframing de Alison Wood Brooks (Harvard):</strong> Em vez de dizer "estou nervoso" (que reforça o medo), diga "estou animado". A ativação fisiológica é <em>idêntica</em> — a diferença está no significado que você atribui a ela. Ansiedade = ameaça. Animação = oportunidade. A pesquisa mostrou que esta simples mudança de linguagem melhora a performance mensurável.</p>
              <p><strong>Técnica de respiração 4-7-8:</strong></p>
              <ul>
                <li>Inspire pelo nariz contando 4 tempos</li>
                <li>Segure a respiração contando 7 tempos</li>
                <li>Expire pela boca contando 8 tempos</li>
                <li>Repita 3–4 vezes</li>
              </ul>
              <p>Isso ativa o sistema nervoso parassimpático (o "descanso e digestão"), reduzindo a frequência cardíaca em 2–3 minutos. Use antes de entrar no palco, na coxia, no camarim.</p>
              <p><strong>A armadilha de "tocar para não errar":</strong> Quando o objetivo é não errar, o foco está no medo. Quando o objetivo é servir a música e o groove, o foco está na ação positiva. Mude a pergunta de "e se eu errar?" para "como posso fazer esta linha de baixo soar da melhor forma possível?"</p>
            </div>
          </div>

          <div class="expand-block">
            <button class="expand-toggle" onclick="toggleExpand('m21-pratica-mental')">
              <span><strong>🧘 Prática Mental: Tocar Sem o Instrumento</strong><br>
              <span class="expand-toggle-sub">Como atletas de elite praticam — e como aplicar à música</span></span>
              <span class="expand-icon">+</span>

            <div class="expand-body" id="m21-pratica-mental" style="display:none">
              <p><strong>O que é prática mental (mental rehearsal):</strong> Praticar uma habilidade inteiramente na mente, sem o instrumento — visualizando os movimentos, ouvindo o som internamente, sentindo a sequência emocional da performance. Não é devaneio — é prática deliberada interna.</p>
              <p><strong>Como atletas de elite usam:</strong> Pesquisas com atletas olímpicos mostram que mental rehearsal ativa os mesmos padrões neurais que a prática física. Michael Phelps visualizava cada braçada antes de competir. Tiger Woods mentalizava cada tacada. Pianistas como Glenn Gould e Artur Schnabel eram conhecidos por passarem horas estudando mentalmente antes de tocar.</p>
              <p><strong>Como aplicar ao baixo elétrico:</strong></p>
              <ul>
                <li><strong>Visualização da performance:</strong> Feche os olhos. Imagine o palco, o equipamento, a banda. Visualize-se entrando, pegando o baixo, checando a afinação. Sinta a frieza das cordas. Ouça mentalmente o metrônomo ou o count-in do baterista.</li>
                <li><strong>Mental walkthrough da música:</strong> "Toque" a música inteira na cabeça — ouça cada nota, sinta cada mudança de posição no braço, sinta o groove nas mãos. Inclua as partes difíceis e visualize-as indo bem.</li>
                <li><strong>Preparação para imprevistos:</strong> Visualize um erro acontecendo — e visualize-se recuperando sem perder o groove. Isso programa a resposta de recovery antes que o imprevisto ocorra.</li>

              <p><strong>Protocolo de 5 minutos:</strong> Antes de qualquer ensaio ou show, feche os olhos por 5 minutos e faça o mental walkthrough do repertório. Identifique onde há insegurança — são os pontos que precisam de mais atenção no ensaio físico.</p>

          <div class="expand-block">
            <button class="expand-toggle" onclick="toggleExpand('m21-erros')">

            <div class="expand-body" id="m21-erros" style="display:none">
              <p><strong>A diferença entre erro e catástrofe:</strong> Um erro é uma nota errada, um ataque impreciso, uma mudança atrasada. Uma catástrofe é parar de tocar, olhar para o chão em desespero, ou deixar o erro contaminar os próximos 20 compassos. O erro é inevitável. A catástrofe é uma escolha.</p>
              <p><strong>Como o público ouve:</strong> A pesquisa de psicologia da performance musical é clara: ouvintes não-músicos raramente percebem erros técnicos quando o <em>fluxo musical</em> é mantido. O que eles percebem é a reação do músico ao erro. Se você parar, franzir a testa e chacoalhar a cabeça, o público percebe que algo deu errado — mesmo sem saber o que foi. Se você continuar com a mesma expressão e energia, eles não percebem.</p>
              <p><strong>Mantendo o groove depois de errar:</strong> O groove é o contrato entre o baixista e o restante da banda. Mesmo com uma nota errada, se o ritmo estiver intacto, a banda continua. Quebre o ritmo e você compromete todos. Prioridade: <strong>ritmo sempre, notas quando possível</strong>.</p>
              <p><strong>O conceito de "recovery":</strong> Recovery é a habilidade de recuperar o fio da meada depois de um erro sem que ninguém perceba. Treine isso deliberadamente: no ensaio, proponha tocar o repertório sem parar mesmo quando errar. A primeira vez é desconfortável. Com repetição, você desenvolve reflexo de recovery automático.</p>
              <p><strong>O que fazer nos segundos após um erro:</strong></p>
              <ul>
                <li>Mantenha o ritmo — não pare, não desacelere</li>
                <li>Não mude a expressão — continue como se nada tivesse acontecido</li>
                <li>Simplifique se necessário — prefira uma nota certa a uma passagem errada</li>
                <li>Foque no próximo compasso, não no erro que passou</li>
              </ul>
            </div>
          </div>

          <div class="info-box">
            Uma escala é uma sequência de notas organizadas por intervalos específicos dentro de uma oitava. Cada tonalidade tem uma identidade emocional única — maior soa alegre e brilhante; menor soa introspectiva e dramática. Todo músico precisa dominar as duas famílias.

              <strong>A fórmula:</strong> T T S T T T S (Tom=2 semitons, Semitom=1 semitom). Aplicar essa fórmula a qualquer nota gera a escala maior daquela nota.<br><br>
              <strong>Dó maior (a mais simples):</strong> Dó-Ré-Mi-Fá-Sol-Lá-Si-Dó. Apenas teclas brancas. O "molde" a partir do qual todas as outras são derivadas.<br><br>
              <strong>Sol maior:</strong> Sol-Lá-Si-Dó-Ré-Mi-Fá#-Sol. Um sustenido (Fá#).<br>
              <strong>Ré maior:</strong> Ré-Mi-Fá#-Sol-Lá-Si-Dó#-Ré. Dois sustenidos.<br>
              <strong>Fá maior:</strong> Fá-Sol-Lá-Sib-Dó-Ré-Mi-Fá. Um bemol (Sib).<br><br>
              <strong>O Círculo de Quintas:</strong> Organiza as 12 tonalidades maiores em sequência. Cada tonalidade à direita adiciona 1 sustenido; cada tonalidade à esquerda adiciona 1 bemol. Memorize esse círculo — é o mapa da harmonia tonal.<br><br>
              <strong>Dedilhado das escalas:</strong> Cada escala tem um dedilhado específico determinado pelas teclas pretas envolvidas. Para Dó maior (MD): 1-2-3-1-2-3-4-5 (passagem de polegar entre o 3° e 4° dedo). Para escalas com bemóis e sustenidos, o dedilhado varia — consulte uma tabela de dedilhados.

              <strong>Menor Harmônica:</strong> A 7ª nota é elevada em 1 semitom (gerando um intervalo de 1½ tom entre o 6° e 7° grau). Na Lá menor harmônica: Lá-Si-Dó-Ré-Mi-Fá-Sol#-Lá. O Sol# cria tensão que resolve perfeitamente no Lá — muito usado na música clássica.<br><br>
              <strong>Menor Melódica:</strong> Ao subir, o 6° e 7° graus são elevados (soa mais suave); ao descer, volta ao menor natural. Na Lá menor melódica: sobe Lá-Si-Dó-Ré-Mi-Fá#-Sol#-Lá; desce Lá-Sol-Fá-Mi-Ré-Dó-Si-Lá.<br><br>

            </button>

              <strong>Metrônomo progressivo:</strong> Comece em 60 BPM (semínimas = 1 nota por batida). Quando conseguir 2 oitavas limpas, passe para 80. Depois colcheias no mesmo BPM (2 notas por batida) = velocidade dobrada sem mudar o metrônomo.<br><br>

              <strong>Terzas (terças paralelas):</strong> Toque a escala com a MD enquanto a ME toca a mesma escala começando uma terça abaixo. Desenvolvimento avançado de coordenação e igualdade de toque.<br><br>
              <strong>Em oitavas paralelas:</strong> As duas mãos tocam a mesma escala em paralelo, cada uma a 8 notas de distância. Exige sincronismo perfeito e projeta um som poderoso — muito idiomático ao piano.

              <strong>Tríade Menor:</strong> Terça menor (3 semitons) + terça maior (4 semitons). Som: introspectivo, expressivo, triste. Ex: Lá menor = A-C-E (Lá-Dó-Mi).<br><br>

              <strong>Por que usar inversões:</strong> Condução de vozes (voice leading) — mover de um acorde ao próximo com o mínimo de movimento possível. Em vez de C (C-E-G) → F (F-A-C), use C (C-E-G) → F em primeira inversão (C-F-A). O C do baixo permanece, e apenas E→F e G→A se movem. Muito mais fluido e musical.<br><br>

              <strong>O que faz:</strong> Levanta todos os apagadores simultaneamente, permitindo que todas as notas vibrem livremente mesmo após soltar as teclas. O som "respira" e flui de forma muito mais rica.<br><br>
              <strong>Pedal legato (sincopado):</strong> A técnica mais importante. Pressione o pedal <em>depois</em> de tocar a primeira nota (não antes). Quando mudar o acorde, solte o pedal imediatamente e pressione novamente — a troca acontece simultaneamente ao novo acorde. Isso limpa a harmonia anterior mas mantém a continuidade sonora.<br><br>
              <strong>Half-pedaling:</strong> Pressionar o pedal até a metade. Os apagadores descem parcialmente, abafando ligeiramente as notas sem silenciá-las completamente. Cria um efeito nebuloso e etéreo. Muito usado em música impressionista (Debussy, Ravel).<br><br>
              <strong>Erros comuns:</strong> 1) Pressionar antes da nota (acumula harmonia suja); 2) Não trocar na mudança de acorde (cria dissonância); 3) Não usar (som seco demais, sem ressonância).

              <strong>Pedal do Meio (Sostenuto):</strong> Mantém sustain apenas das notas que estavam sendo tocadas no momento em que foi pressionado. Permite sustentar um baixo profundo enquanto toca acordes limpos acima, sem pedal. Pouco usado no repertório popular, mas essencial em algumas obras de Debussy e Ravel.<br><br>

              <strong>Suítes para teclado:</strong> As Suítes Francesas, Inglesas e Partitas são o cume do Bach para teclado. Cada suíte tem movimentos de dança (allemande, courante, sarabande, gigue) com técnica cada vez mais exigente.

              <strong>O que é dominante secundário:</strong> O acorde V7 de qualquer grau que não seja a tônica. Em Dó maior, o V do II grau (Ré menor) seria A7 (o dominante de Ré). Isso cria tensão local que resolve em Ré minor antes de continuar a progressão.<br><br>
              <strong>V/V (dominante da dominante):</strong> Em Dó maior, V=Sol. O V do Sol = Ré maior (D ou D7). Progressão: D7 → G → C. Cada passo resolve para o seguinte. Muito usado em cadências elaboradas.<br><br>

              <strong>bVII:</strong> Em Dó maior: Bb (Sib maior). Soa "modal", folk, grandioso. "Let It Be", "Hey Jude" (Beatles), muito rock clássico e MPB usam bVII extensivamente.<br><br>

            </button>
            <div class="expand-body" id="p18-melodia" style="display:none">
              <strong>Equilíbrio tensão-resolução:</strong> Uma boa melodia cria tensão (salto, nota de passagem, tensão harmônica) e a resolve. Melodias que só resolvem são monótonas; que só tensionam são angustiantes. A dialética entre os dois é o drama musical.<br><br>
              <strong>Contorno melódico:</strong> A forma gráfica da melodia — subidas, descidas, platôs. As melhores melodias têm um ponto climático único (geralmente a nota mais aguda) que ocorre perto do final da frase, não no meio. Depois do clímax, a melodia "pousa".<br><br>
              <strong>Sequência e repetição:</strong> Repetir um motivo em alturas diferentes (sequência) cria coerência sem monotonia. "Joy to the World" é completamente construído sobre sequências descendentes. "Für Elise" de Beethoven usa o motivo de 5 notas em múltiplas alturas.<br><br>
              <strong>A importância do silêncio:</strong> Pausas são tão musicais quanto as notas. "Imagine" (John Lennon) e "My Favorite Things" (Rodgers/Hammerstein) têm frases separadas por silêncios que criam respiração e expectativa. Melodias sem pausa sufocam o ouvinte.
            </div>

              <span class="expand-icon">+</span>

              <strong>O que é arranjo:</strong> Adaptar uma música existente para um formato diferente — neste caso, de canção (voz + violão/banda) para piano solo. O arranjo distribui melodia, baixo, harmonia e ritmo entre as duas mãos.<br><br>
              <strong>Estrutura do arranjo para piano:</strong><br>
              • MD = melodia + vozes internas (fills e contramelodia)<br>
              • ME = baixo + acordes (vários padrões: alberti, arpejo, bloco, ostinato)<br><br>
              <strong>Construção de arranjo passo a passo:</strong><br>
              1. Toque apenas a melodia com MD (já aprendida)<br>
              2. Adicione ME simples (notas longas ou baixo + acorde)<br>
              3. Refine a ME com o padrão mais adequado ao estilo<br>
              4. Adicione ornamentos, fills e contramelodias onde a melodia "respira"<br>

              <strong>Referência:</strong> David Lanz, Jim Brickman (new age piano solo), Brad Mehldau (arranjos de rock/pop em jazz), Gonzalo Rubalcaba (MPB e jazz latinoamericano em piano solo).
            </div>

              <strong>Semanas 5–6:</strong> Elabore o arranjo — adicione padrão de acompanhamento, ornamentos, dinâmica, pedal.<br><br>
              <strong>Semanas 7–8:</strong> Memorize e policie. Toque a composição para alguém. A reação do ouvinte é o feedback mais honesto.
            </div>
